default_install_hook_types:
    - pre-commit
    - commit-msg
default_stages:
    - pre-commit
exclude: ^e2e/|^test_apps/|vendor/|node_modules/|target/|parsers/|crates/.*/deps/|crates/.*/tmp/|_build/|^docs/assets/
repos:
    - repo: https://github.com/Goldziher/gitfluff
      rev: v0.8.0
      hooks:
          - id: gitfluff-lint
            args:
                - --write
            stages:
                - commit-msg
    - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
      rev: v2.1.3
      hooks:
          # AI governance
          - id: ai-rulez-generate

          # File safety
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-merge-conflict
          - id: check-added-large-files
            args:
                - --maxkb=500
            exclude: Cargo.lock
          - id: detect-private-key
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-shebang-scripts-are-executable
          - id: mixed-line-ending
          - id: typos
            args: ["--force-exclude"]
          - id: check-json
          - id: check-yaml
            args:
                - --allow-multiple-documents
                - --unsafe
          - id: check-toml

          # GitHub Actions
          - id: actionlint
          - id: gh-actions-updater

          # Shell
          - id: shfmt
            args:
                - -w
                - -i
                - "2"
          - id: shellcheck

          # Markdown
          - id: rumdl-fmt
          - id: markdownlint-rumdl-strict
          - id: textlint
            files: ^docs/.*\.md$
            exclude: ^docs/(CHANGELOG|snippets/|reference/|api-|migration/)
            args:
                - --fix
                - --config
                - .textlintrc.json

          # Rust — cargo-check dropped in v2.0.0; cargo-clippy with -D warnings supersedes it
          - id: cargo-fmt
            args: ["--all"]
          - id: cargo-clippy
            args: ["--fix", "--allow-dirty", "--allow-staged", "--workspace", "--all-features", "--all-targets", "--", "-D", "warnings"]
          - id: cargo-sort
            args:
                - -w
            exclude: ^(e2e/rust/|test_apps/rust/|crates/ts-pack-core-wasm/)Cargo\.toml$
          - id: cargo-machete
          - id: cargo-deny
            args: ["check"]
          - id: rustdoc-lint
          - id: rust-max-lines
            args: ["--max=1000"]
            # Remediation backlog: existing files over the 1,000-LOC ceiling. New
            # files are subject to the cap. Shrink this list when files are split.
            exclude: ^(crates/tree-sitter-language-pack-jni/src/lib\.rs|crates/ts-pack-core-ffi/src/lib\.rs|crates/ts-pack-core-node/src/lib\.rs|crates/ts-pack-core-php/src/lib\.rs|crates/ts-pack-core-py/src/lib\.rs|crates/ts-pack-core-wasm/src/lib\.rs|crates/ts-pack-core/src/download\.rs|packages/dart/rust/src/frb_generated\.rs|packages/dart/rust/src/lib\.rs|packages/elixir/native/tree_sitter_language_pack_nif/src/lib\.rs|packages/ruby/ext/ts_pack_core_rb/src/lib\.rs|packages/swift/rust/src/lib\.rs)$

          # Python
          - id: pyproject-fmt
            additional_dependencies: ["pyproject-fmt==2.5.0"]
            # alef sync-versions emits packages/python/pyproject.toml with a
            # specific classifier list, lint.per-file-ignores ordering, and
            # tool.mypy overrides block. pyproject-fmt re-orders + collapses
            # entries, which then trips the `git diff --exit-code` check in CI
            # after alef sync-versions re-emits.
            exclude: ^packages/python/pyproject\.toml$
          - id: ruff
            exclude: ^fixtures/bench/
          - id: ruff-format
            exclude: ^fixtures/bench/
          - id: mypy
            exclude: ^(e2e/|fixtures/bench/|scripts/clone_vendors\.py$)
            args:
                - --strict
                - --explicit-package-bases
                - scripts
            env:
                MYPYPATH: packages/python
          - id: pydocstyle
            files: ^packages/python/.*\.py$
            exclude: ^packages/python/(tests/|.*_native\.py$)

          # JS/TS
          - id: oxlint
            exclude: ^fixtures/bench/
          - id: oxfmt
            # napi-rs bootstrap shim is re-emitted by alef sync-versions in
            # 2-space form; oxfmt's tab/single-line auto-format would diverge,
            # breaking the `git diff --exit-code` check in CI Validate.
            exclude: |
                (?x)^(
                  fixtures/bench/|
                  crates/ts-pack-core-node/index\.js$
                )
          - id: tsc-typecheck
          - id: tsdoc-lint

          # Go
          - id: go-fmt
            exclude: ^(e2e/|test_apps/)
          - id: golangci-lint
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: govulncheck
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: godoc-lint

          # Java
          - id: palantir-java-format
          - id: checkstyle
            args:
                - -c
                - packages/java/checkstyle.xml
                - -p
                - packages/java/checkstyle.properties
            exclude: ^(e2e/|test_apps/|packages/java/src/|packages/java/dev/)
          - id: pmd
          - id: cpd
            args:
                - --minimum-tokens=250
          - id: java-verify
            files: ^packages/java/
          - id: javadoc-lint
            files: ^packages/java/src/main/.*\.java$

          # Ruby
          - id: rubocop
            files: ^packages/ruby/.*\.rb$
            exclude: ^packages/ruby/ext/
          - id: rubocop-lint
            files: ^packages/ruby/.*\.(rb|rbs)$
            exclude: ^packages/ruby/ext/
          - id: steep
            files: ^packages/ruby/.*\.(rb|rbs)$
          - id: yard-coverage

          # C#
          - id: dotnet-format
            files: ^packages/csharp/.*\.cs$
          - id: dotnet-format-check
            files: ^packages/csharp/.*\.cs$
          - id: cs-xmldoc-lint
            files: ^packages/csharp/TreeSitterLanguagePack/.*\.cs$

          # PHP
          - id: php-cs-fixer
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/stubs/
            args:
                - fix
                - --config=packages/php/php-cs-fixer.php
          - id: phpstan
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/(php-cs-fixer\.php|stubs/)
            args:
                - analyse
                - --no-progress
                - --configuration=packages/php/phpstan.neon
          - id: phpdoc-lint
            files: ^packages/php/src/.*\.php$

          # Elixir
          - id: mix-format
            files: ^packages/elixir/
          - id: mix-credo
            files: ^packages/elixir/
          - id: ex-doc-coverage

          # Dart
          - id: dart-format
          - id: dart-analyze
          - id: dart-doc-lint
            files: ^packages/dart/lib/.*\.dart$
            exclude: ^packages/dart/lib/src/rust/

          # Zig
          - id: zig-fmt
          - id: zig-build-check
          - id: zig-doc-lint

          # C / C++
          - id: clang-format
            args:
                - --style=file
                - -i
            files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
            exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
          - id: clang-tidy
            files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
            exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
          - id: cppcheck
            exclude: ^packages/swift/Sources/RustBridgeC/

          # Alef bindings (this repo consumes alef-generated bindings)
          - id: alef-verify
          - id: alef-sync-versions
          - id: alef-docs-fresh
          - id: alef-snippets-validate

          # Repo-local additions not in canonical block (Kotlin, Swift, Docker)
          - id: ktfmt
          - id: detekt
          - id: ktlint
          - id: hadolint
          - id: swift-format
            # alef sync-versions emits Package.swift with a single-line URL;
            # swift-format wraps to next-line, breaking the `git diff --exit-code`
            # check in CI after alef sync-versions re-emits.
            exclude: ^Package\.swift$
          - id: swiftlint
