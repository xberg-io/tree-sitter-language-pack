default_install_hook_types:
  - pre-commit
  - commit-msg
exclude: ^e2e/|^test_apps/|vendor/|node_modules/|target/|parsers/|crates/.*/deps/|crates/.*/tmp/|_build/

repos:
  # AI Rules
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.1.4
    hooks:
      - id: ai-rulez-generate

  # Commit message linting
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args: ["--write"]
        stages: [commit-msg]

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
        exclude: Cargo.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args: ["--allow-multiple-documents", "--unsafe"]
      - id: check-toml
      - id: check-case-conflict

  # TOML formatting
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: "v2.21.1"
    hooks:
      - id: pyproject-fmt

  - repo: https://github.com/DevinR528/cargo-sort
    rev: "v2.1.4"
    hooks:
      - id: cargo-sort
        args: [-w]

  # Rust: formatting and linting
  - repo: https://github.com/AndrejOrsula/pre-commit-cargo
    rev: 0.5.0
    hooks:
      - id: cargo-fmt
        args: ["--all"]
      - id: cargo-clippy
        args:
          [
            "--fix",
            "--allow-dirty",
            "--allow-staged",
            "--workspace",
            "--all-features",
            "--all-targets",
            "--",
            "-D",
            "warnings",
          ]

  - repo: https://github.com/bnjbvr/cargo-machete
    rev: v0.9.2
    hooks:
      - id: cargo-machete

  - repo: https://github.com/EmbarkStudios/cargo-deny
    rev: 0.19.4
    hooks:
      - id: cargo-deny
        args: ["check"]

  # Markdown: linting
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: "v0.1.85"
    hooks:
      - id: rumdl-fmt
        exclude: "^.ai-rulez/"

  # Python: ruff (linting + formatting)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Node/TS/WASM: oxlint
  - repo: https://github.com/oxc-project/mirrors-oxlint
    rev: v1.62.0
    hooks:
      - id: oxlint
        args: ["--fix"]

  # cppcheck — kept upstream until shared repo ships it
  - repo: https://github.com/pocc/pre-commit-hooks
    rev: v1.3.5
    hooks:
      - id: cppcheck
        args:
          [
            "--std=c11",
            "--enable=warning,style,performance",
            "--suppress=missingIncludeSystem",
            "--suppress=unusedStructMember",
            "--suppress=normalCheckLevelMaxBranches",
          ]
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)

  # Java cpd — kept upstream (not yet in shared repo)
  - repo: https://github.com/gherynos/pre-commit-java
    rev: v0.6.37
    hooks:
      - id: cpd
        exclude: ^(e2e/|test_apps/|packages/java/dev/)

  # Shared kreuzberg-dev polyglot hooks
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v0.1.0
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2"]
      - id: shellcheck
      - id: clang-format
        args: ["--style=file", "-i"]
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
        exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
      - id: clang-tidy
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
        exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
      - id: checkstyle
        args:
          [
            "-c",
            "packages/java/checkstyle.xml",
            "-p",
            "packages/java/checkstyle.properties",
          ]
        exclude: ^(e2e/|test_apps/|packages/java/src/|packages/java/dev/)
      - id: mypy
        exclude: "^(e2e/|fixtures/bench/|scripts/clone_vendors\\.py$)"
        args: [--strict, scripts]
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
        exclude: ^packages/ruby/ext/
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/stubs/
        args: [fix, --config=packages/php/php-cs-fixer.php]
      - id: phpstan
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/(php-cs-fixer\.php|stubs/)
        args: [analyse, --no-progress, --configuration=packages/php/phpstan.neon]
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/
      - id: textlint
        files: ^docs/[^/]+/[^/]+\.md$
        exclude: ^docs/(CHANGELOG|snippets/|reference/|api-)

  # Alef: polyglot binding generation and version sync
  - repo: https://github.com/kreuzberg-dev/alef
    rev: v0.12.10
    hooks:
      - id: alef-verify
      - id: alef-sync-versions

  # GitHub Actions: linting
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  # Spelling: fast Rust-based spell checker
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.0
    hooks:
      - id: typos
        args: [--force-exclude]
