default_install_hook_types:
    - pre-commit
    - commit-msg
default_stages:
    - pre-commit
exclude: ^e2e/|^test_apps/|vendor/|node_modules/|target/|parsers/|crates/.*/deps/|crates/.*/tmp/|_build/|^docs/assets/
repos:
    - repo: https://github.com/Goldziher/gitfluff
      rev: v0.8.0
      hooks:
          - id: gitfluff-lint
            args:
                - --write
            stages:
                - commit-msg
    - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
      rev: v2.3.0
      hooks:
          # Alef verification
          - id: alef-verify

          # Cargo / Rust
          - id: cargo-clippy
            args: ["--fix", "--allow-dirty", "--allow-staged", "--workspace", "--all-features", "--all-targets", "--", "-D", "warnings"]
          - id: cargo-sort
            args:
                - -w
            exclude: ^(e2e/rust/|test_apps/rust/|crates/ts-pack-core-wasm/)Cargo\.toml$
          - id: cargo-machete
          - id: cargo-deny
            args: ["check"]
          - id: rustdoc-lint
          - id: rust-max-lines
            args: ["--max=1000"]
            # Remediation backlog: existing files over the 1,000-LOC ceiling. New
            # files are subject to the cap. Shrink this list when files are split.
            exclude: ^(crates/tree-sitter-language-pack-jni/src/lib\.rs|crates/ts-pack-core-ffi/src/lib\.rs|crates/ts-pack-core-node/src/lib\.rs|crates/ts-pack-core-php/src/lib\.rs|crates/ts-pack-core-py/src/lib\.rs|crates/ts-pack-core-wasm/src/lib\.rs|crates/ts-pack-core/build\.rs|crates/ts-pack-core/src/download\.rs|crates/ts-pack-core/src/intel/data_extraction\.rs|packages/dart/rust/src/frb_generated\.rs|packages/dart/rust/src/lib\.rs|packages/elixir/native/tree_sitter_language_pack_nif/src/lib\.rs|packages/ruby/ext/ts_pack_core_rb/src/lib\.rs|packages/swift/rust/src/lib\.rs)$

          # Linters and checks
          - id: ai-rulez-generate
          - id: ai-rulez-validate

          - id: check-merge-conflict
          - id: check-added-large-files
            args:
                - --maxkb=500
            exclude: Cargo.lock
          - id: detect-private-key
          - id: check-case-conflict
          - id: check-executables-have-shebangs
          - id: check-shebang-scripts-are-executable
          - id: typos
            args: ["--force-exclude"]
          - id: check-json
          - id: check-yaml
            args:
                - --allow-multiple-documents
                - --unsafe
          - id: check-toml

          - id: actionlint
          - id: gh-actions-updater

          - id: shellcheck
            exclude: ^packages/kotlin-android/gradlew$

          - id: markdownlint-rumdl-strict
            exclude: ^(docs/reference/.*|packages/.*/README\.md|crates/.*/README\.md|templates/readme/.*|README\.md|CHANGELOG\.md)$
          - id: textlint
            files: ^docs/.*\.md$
            exclude: ^docs/(CHANGELOG|snippets/|reference/|api-|migration/)
            args:
                - --fix
                - --config
                - .textlintrc.json

          - id: ruff
            exclude: ^fixtures/bench/
          - id: mypy
            exclude: ^(e2e/|fixtures/bench/|scripts/clone_vendors\.py$)
            args:
                - --strict
                - --explicit-package-bases
                - scripts
            env:
                MYPYPATH: packages/python
          - id: pydocstyle
            files: ^packages/python/.*\.py$
            exclude: ^packages/python/(tests/|.*_native\.py$)

          - id: oxlint
            exclude: ^fixtures/bench/
          - id: tsc-typecheck
          - id: tsdoc-lint

          - id: golangci-lint
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: govulncheck
            exclude: ^(e2e/|test_apps/)
            env:
                KREUZBERG_GO_MOD_DIRS: packages/go
          - id: godoc-lint

          - id: checkstyle
            args:
                - -c
                - packages/java/checkstyle.xml
                - -p
                - packages/java/checkstyle.properties
            exclude: ^(e2e/|test_apps/|packages/java/src/|packages/java/dev/)
          - id: pmd
          - id: cpd
            args:
                - --minimum-tokens=250
          - id: java-verify
            files: ^packages/java/
          - id: javadoc-lint
            files: ^packages/java/src/main/.*\.java$

          - id: detekt
            files: ^packages/kotlin-android/.*\.kts?$
            args: [--build-upon-default-config]
          # NOTE: ktlint is intentionally NOT run on alef-generated kotlin-android.
          # ktfmt (--kotlinlang-style) is the canonical formatter (matches alef:format);
          # ktlint's always-format mode conflicts with ktfmt (blank-line-after-brace) and
          # mangles alef's `///` doc comments into `// /`. detekt covers static analysis.
          - id: kotlin-dokka

          - id: rubocop-lint
            files: ^packages/ruby/.*\.(rb|rbs)$
            exclude: ^packages/ruby/ext/
          - id: steep
            files: ^packages/ruby/.*\.(rb|rbs)$
          - id: yard-coverage

          - id: dotnet-format-check
            files: ^packages/csharp/.*\.cs$
          - id: cs-xmldoc-lint
            files: ^packages/csharp/TreeSitterLanguagePack/.*\.cs$

          - id: phpstan
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/(php-cs-fixer\.php|stubs/)
            args:
                - analyse
                - --no-progress
                - --configuration=packages/php/phpstan.neon
          - id: phpdoc-lint
            files: ^packages/php/src/.*\.php$

          - id: mix-credo
            files: ^packages/elixir/
          - id: ex-doc-coverage

          - id: air-check
            files: ^packages/r/.*\.[Rr]$
          - id: lintr
            files: ^packages/r/.*\.[Rr]$
          - id: roxygen2-check
            files: ^packages/r/R/.*\.R$

          - id: swiftlint
          - id: swift-doc-coverage
          - id: dart-analyze
          - id: dart-doc-lint
            files: ^packages/dart/lib/.*\.dart$
            exclude: ^packages/dart/lib/src/rust/

          - id: zig-build-check
          - id: zig-doc-lint

          - id: clang-tidy
            files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
            exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
          - id: cppcheck
            exclude: ^packages/swift/Sources/RustBridgeC/

          - id: hadolint
          - id: alef-docs-fresh
          - id: alef-snippets-validate

          # Formatters
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: mixed-line-ending
          - id: shfmt
            args:
                - -w
                - -i
                - "2"
          - id: rumdl-fmt
          - id: cargo-fmt
            args: ["--all"]
          - id: pyproject-fmt
            additional_dependencies: ["pyproject-fmt==2.5.0"]
            # alef emits packages/python/pyproject.toml with a
            # specific classifier list, lint.per-file-ignores ordering, and
            # tool.mypy overrides block. pyproject-fmt re-orders + collapses
            # entries, which then trips the `git diff --exit-code` check in CI
            # after alef re-emits.
            exclude: ^packages/python/pyproject\.toml$
          - id: ruff-format
            exclude: ^fixtures/bench/
          - id: oxfmt
            # napi-rs bootstrap shim is re-emitted by alef in
            # 2-space form; oxfmt's tab/single-line auto-format would diverge,
            # breaking the `git diff --exit-code` check in CI Validate.
            # The ai-rulez manifest is owned by the ai-rulez-generate hook and is
            # deterministic; oxfmt would reformat it and fight that generator.
            exclude: |
                (?x)^(
                  fixtures/bench/|
                  \.ai-rulez/\.generated-manifest\.json$|
                  crates/ts-pack-core-node/index\.js$
                )
          - id: go-fmt
            exclude: ^(e2e/|test_apps/)
          - id: palantir-java-format
          - id: ktfmt
            files: ^packages/kotlin-android/.*\.kts?$
            args:
                - --kotlinlang-style
          - id: rubocop
            files: ^packages/ruby/.*\.rb$
            exclude: ^packages/ruby/ext/
          - id: dotnet-format
            files: ^packages/csharp/.*\.cs$
          - id: php-cs-fixer
            files: ^packages/php/.*\.php$
            exclude: ^packages/php/stubs/
            args:
                - fix
                - --config=packages/php/php-cs-fixer.php
          - id: mix-format
            files: ^packages/elixir/
          - id: air-format
            files: ^packages/r/.*\.[Rr]$
          - id: swift-format
            # alef emits Package.swift with a single-line URL;
            # swift-format wraps to next-line, breaking the `git diff --exit-code`
            # check in CI after alef re-emits.
            exclude: ^Package\.swift$
          - id: dart-format
          - id: zig-fmt
            # alef emits `b.option(...)` arguments in multi-line form so the
            # signature column-aligns; zig-fmt collapses them to a single
            # long line, which then breaks the `git diff --exit-code` check
            # in CI after alef re-runs sync-versions.
            exclude: ^packages/zig/build\.zig$
          - id: clang-format
            args:
                - --style=file
                - -i
            files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
            exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
