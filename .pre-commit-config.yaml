default_install_hook_types:
  - pre-commit
  - commit-msg
default_stages:
  - pre-commit
exclude: ^e2e/|^test_apps/|vendor/|node_modules/|target/|parsers/|crates/.*/deps/|crates/.*/tmp/|_build/|^docs/assets/
repos:
  - repo: https://github.com/Goldziher/ai-rulez
    rev: v4.2.1
    hooks:
      - id: ai-rulez-generate
  - repo: https://github.com/Goldziher/gitfluff
    rev: v0.8.0
    hooks:
      - id: gitfluff-lint
        args:
          - --write
        stages:
          - commit-msg
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-added-large-files
        args:
          - --maxkb=500
        exclude: Cargo.lock
      - id: detect-private-key
      - id: check-json
      - id: check-yaml
        args:
          - --allow-multiple-documents
          - --unsafe
      - id: check-toml
      - id: check-case-conflict
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.21.2
    hooks:
      - id: pyproject-fmt
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff
        args:
          - --fix
      - id: ruff-format
  - repo: https://github.com/kreuzberg-dev/pre-commit-hooks
    rev: v1.1.17
    hooks:
      - id: cargo-sort
        args:
          - -w
        exclude: ^(e2e/rust/|test_apps/rust/|crates/ts-pack-core-wasm/)Cargo\.toml$
      - id: cargo-fmt
        args:
          - --all
      - id: cargo-check
        args:
          - --workspace
          - --all-features
          - --all-targets
      - id: cargo-clippy
        args:
          - --fix
          - --allow-dirty
          - --allow-staged
          - --workspace
          - --all-features
          - --all-targets
          - --
          - -D
          - warnings
      - id: cargo-machete
      - id: cargo-deny
        args:
          - check
      - id: pydocstyle
        files: ^packages/python/.*\.py$
        exclude: ^packages/python/(tests/|.*_native\.py$)
      - id: javadoc-lint
        files: ^packages/java/src/main/.*\.java$
      - id: cs-xmldoc-lint
        files: ^packages/csharp/TreeSitterLanguagePack/.*\.cs$
      - id: phpdoc-lint
        files: ^packages/php/src/.*\.php$
      - id: dart-doc-lint
        files: ^packages/dart/lib/.*\.dart$
        exclude: ^packages/dart/lib/src/rust/
      - id: shfmt
        args:
          - -w
          - -i
          - "2"
      - id: shellcheck
      - id: clang-format
        args:
          - --style=file
          - -i
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
        exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
      - id: clang-tidy
        files: (^crates/tree-sitter-language-pack-ffi/|^crates/ts-pack-core-ffi/)
        exclude: ^crates/ts-pack-core-ffi/include/ts_pack\.h$
      - id: checkstyle
        args:
          - -c
          - packages/java/checkstyle.xml
          - -p
          - packages/java/checkstyle.properties
        exclude: ^(e2e/|test_apps/|packages/java/src/|packages/java/dev/)
      - id: mypy
        exclude: ^(e2e/|fixtures/bench/|scripts/clone_vendors\.py$)
        args:
          - --strict
          - --explicit-package-bases
          - scripts
        env:
          MYPYPATH: packages/python
      - id: go-fmt
        exclude: ^(e2e/|test_apps/)
      - id: golangci-lint
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: govulncheck
        exclude: ^(e2e/|test_apps/)
        env:
          KREUZBERG_GO_MOD_DIRS: packages/go
      - id: rubocop
        files: ^packages/ruby/.*\.rb$
        exclude: ^packages/ruby/ext/
      - id: rubocop-lint
        files: ^packages/ruby/.*\.(rb|rbs)$
        exclude: ^packages/ruby/ext/
      - id: steep
        files: ^packages/ruby/.*\.(rb|rbs)$
      - id: dotnet-format
        files: ^packages/csharp/.*\.cs$
      - id: dotnet-format-check
        files: ^packages/csharp/.*\.cs$
      - id: php-cs-fixer
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/stubs/
        args:
          - fix
          - --config=packages/php/php-cs-fixer.php
      - id: phpstan
        files: ^packages/php/.*\.php$
        exclude: ^packages/php/(php-cs-fixer\.php|stubs/)
        args:
          - analyse
          - --no-progress
          - --configuration=packages/php/phpstan.neon
      - id: mix-format
        files: ^packages/elixir/
      - id: mix-credo
        files: ^packages/elixir/
      - id: java-verify
        files: ^packages/java/
      - id: textlint
        files: ^docs/.*\.md$
        exclude: ^docs/(CHANGELOG|snippets/|reference/|api-|migration/)
        args:
          - --fix
          - --config
          - .textlintrc.json
      - id: oxlint
      - id: oxfmt
      - id: rumdl-fmt
      - id: cpd
        args:
          - --minimum-tokens=250
      - id: ktfmt
      - id: detekt
      - id: ktlint
      - id: cppcheck
        # RustBridgeC.h is swift-bridge-generated glue; its boilerplate structs
        # (RustStr, FfiSlice, OptionU8, …) trip cppcheck's unusedStructMember
        # style check because the header is analysed in isolation.
        exclude: ^packages/swift/Sources/RustBridgeC/
      - id: hadolint
      - id: dart-format
      - id: dart-analyze
      - id: swift-format
      - id: swiftlint
      - id: zig-fmt
      - id: zig-build-check
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint
  - repo: https://github.com/Goldziher/gh-actions-updater
    rev: v0.1.3
    hooks:
      - id: gh-actions-updater
  - repo: https://github.com/crate-ci/typos
    rev: v1.46.2
    hooks:
      - id: typos
        args:
          - --force-exclude
