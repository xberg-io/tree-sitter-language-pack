version: "3"

tasks:
  deps:
    desc: Install Elixir dependencies
    dir: packages/elixir
    cmds:
      - mix deps.get

  build:
    desc: Compile Elixir project (includes Rustler NIF)
    dir: packages/elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - mix compile

  test:
    desc: Run Elixir tests
    dir: packages/elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
      MIX_ENV: test
    cmds:
      - mix test

  format:
    desc: Format Elixir code
    dir: packages/elixir
    cmds:
      - mix format

  format:check:
    desc: Check Elixir formatting (CI)
    dir: packages/elixir
    cmds:
      - mix format --check-formatted

  lint:
    desc: Lint Elixir code (credo, requires NIF built first)
    dir: packages/elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - mix credo --strict

  lint:check:
    desc: Check Elixir linting without modifications (CI)
    dir: packages/elixir
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - mix credo --strict

  update:
    desc: Update Elixir dependencies within current major versions (non-breaking)
    dir: packages/elixir
    cmds:
      - echo "Updating Elixir dependencies (within-major)..."
      - cmd: echo "Note - Elixir requires manual mix.exs edits for major version updates"
      - cmd: mix hex.outdated
        ignore_error: true
      - mix deps.update --all
      - echo "Checking remaining outdated dependencies..."
      - cmd: mix hex.outdated
        ignore_error: true

  upgrade:
    desc: Upgrade Elixir dependencies to latest versions (cross-major / breaking)
    dir: packages/elixir
    cmds:
      - echo "Upgrading Elixir dependencies (cross-major)..."
      - cmd: echo "Note - true cross-major requires manual mix.exs edits"
      - cmd: mix hex.outdated
        ignore_error: true
      - mix deps.unlock --all
      - mix deps.update --all
      - echo "Checking remaining outdated dependencies..."
      - cmd: mix hex.outdated
        ignore_error: true

  clean:
    desc: Clean Elixir build artifacts
    dir: packages/elixir
    cmds:
      - mix clean

  e2e:generate:
    desc: Generate Elixir E2E tests from fixtures
    env:
      PROJECT_ROOT: "{{.PROJECT_ROOT}}"
    cmds:
      - alef e2e generate --lang elixir

  e2e:test:
    desc: Run Elixir E2E tests
    cmds:
      - cmd: mix deps.get
        dir: e2e/elixir
      - alef test --lang elixir --e2e --jobs 1
