version: "3"

# Canonical e2e workflow for tree-sitter-language-pack.
#
# Mirrors the kreuzberg-dev e2e task surface (kreuzcrawl/Taskfile.yml +
# kreuzcrawl/.task/workflows/e2e.yml), minus the mock HTTP server: tslp
# tests parsers against local tree-sitter grammars only — pure CPU, no I/O.

tasks:
  generate:all:
    desc: Generate all E2E tests from fixtures across all supported languages
    cmds:
      - alef e2e generate

  test:all:
    desc: Run all E2E tests across all supported languages (builds FFI first)
    cmds:
      # Build the C ABI artifact most language bindings depend on.
      - cargo build --release -p ts-pack-core-ffi
      - task: rust:e2e:test
      - task: python:e2e:test
      - task: node:e2e:test
      - task: go:e2e:test
      - task: java:e2e:test
      - task: csharp:e2e:test
      - task: ruby:e2e:test
      - task: php:e2e:test
      - task: elixir:e2e:test
      - task: wasm:e2e:test
      - task: c:e2e:test

  test:quick:
    desc: Quick E2E test (Rust only — fastest feedback)
    cmds:
      - task: rust:e2e:test

  verify:all:
    desc: Full E2E pipeline — generate, lint, and test all suites
    cmds:
      - task: generate:all
      - task: lint:all
      - task: test:all

  lint:all:
    desc: Lint all generated E2E test code
    cmds:
      - task: rust:e2e:format
