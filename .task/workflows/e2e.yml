version: "3"

# Canonical e2e workflow for tree-sitter-language-pack.
#
# Mirrors the xberg e2e task surface (crawlberg/Taskfile.yml +
# crawlberg/.task/workflows/e2e.yml), minus the mock HTTP server: tslp
# tests parsers against local tree-sitter grammars only — pure CPU, no I/O.

tasks:
  generate:
    internal: true
    desc: Generate all E2E tests from fixtures across all supported languages
    cmds:
      - alef e2e generate

  build:
    internal: true
    desc: Build all language bindings for E2E tests
    cmds:
      - alef build

  test:
    internal: true
    desc: Run all E2E tests across all supported languages
    cmds:
      - alef test --e2e --jobs 1

  all:
    internal: true
    desc: Build all bindings and run all E2E tests
    cmds:
      - task: build
      - task: test

  quick:
    internal: true
    desc: Quick E2E test (Rust only — fastest feedback)
    cmds:
      - alef test --lang rust --e2e --jobs 1

  verify:
    internal: true
    desc: Full E2E pipeline — generate, lint, and test all suites
    cmds:
      - task: generate
      - task: lint
      - task: test

  lint:
    internal: true
    desc: Lint all generated E2E test code
    cmds:
      - task rust:e2e:format
