version: "3"

vars:
    WASM_DIR: "{{.PROJECT_ROOT}}/crates/ts-pack-core-wasm"
    # Homebrew LLVM clang supports wasm32 target; system clang on macOS does not
    WASM_CC: '{{.WASM_CC | default "/opt/homebrew/opt/llvm/bin/clang"}}'
    WASM_SYSROOT: '{{.WASM_SYSROOT | default "/opt/homebrew/share/wasi-sysroot"}}'

tasks:
    deps:
        desc: Install WASM build tools
        cmds:
            - rustup target add wasm32-unknown-unknown
            - which wasm-pack || cargo install wasm-pack
            - brew list wasi-libc >/dev/null 2>&1 || brew install wasi-libc
            - brew list llvm >/dev/null 2>&1 || brew install llvm

    build:
        desc: Build WASM package (web target)
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
            CC_wasm32_unknown_unknown: "{{.WASM_CC}}"
            WASI_SYSROOT: "{{.WASM_SYSROOT}}"
        cmds:
            - wasm-pack build "{{.WASM_DIR}}" --target web --release

    build:bundler:
        desc: Build WASM package (bundler target)
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
            CC_wasm32_unknown_unknown: "{{.WASM_CC}}"
            WASI_SYSROOT: "{{.WASM_SYSROOT}}"
        cmds:
            - wasm-pack build "{{.WASM_DIR}}" --target bundler --release

    build:node:
        desc: Build WASM package (Node.js target)
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
            CC_wasm32_unknown_unknown: "{{.WASM_CC}}"
            WASI_SYSROOT: "{{.WASM_SYSROOT}}"
        cmds:
            - wasm-pack build "{{.WASM_DIR}}" --target nodejs --release

    test:
        desc: Run WASM tests
        dir: "{{.WASM_DIR}}"
        cmds:
            - wasm-pack test --headless --firefox

    clean:
        desc: Clean WASM build artifacts
        dir: "{{.WASM_DIR}}"
        cmds:
            - rm -rf pkg target

    e2e:generate:
        desc: Generate WASM E2E tests from fixtures
        env:
            PROJECT_ROOT: "{{.PROJECT_ROOT}}"
        cmds:
            - alef e2e generate --lang wasm

    update:
        desc: Update WASM dependencies within current major versions (non-breaking)
        cmds:
            - echo "WASM packages live in the pnpm workspace; node:update already refreshed packages/wasm"

    upgrade:
        desc: Upgrade WASM dependencies to latest versions (cross-major / breaking)
        cmds:
            - echo "WASM packages live in the pnpm workspace; node:upgrade already refreshed packages/wasm"

    e2e:test:
        desc: Run WASM E2E tests
        cmds:
            - alef test --lang wasm --e2e --jobs 1
