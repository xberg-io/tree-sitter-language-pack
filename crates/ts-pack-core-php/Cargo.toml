[package]
name = "ts-pack-core-php"
version = "1.9.0-rc.7"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
readme = false
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
categories = ["text-processing"]

# `ahash` is conditionally referenced: only when the umbrella crate exposes
# `AHashMap<Cow<str>, _>` parameters (the conditional `__*_ahash` shim rebuilds).
# `futures-util` is similarly conditional on streaming adapters being declared.
[package.metadata.cargo-machete]
ignored = ["tokio", "ahash"]

[lib]
crate-type = ["cdylib"]

[features]
extension-module = []

[dependencies]
ext-php-rs = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tree-sitter-language-pack = { version = "1.9.0-rc.7", path = "../ts-pack-core", features = ["serde", "config", "download"] }
