[package]
name = "ts-pack-core-php"
version = "1.8.0-rc.25"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
readme = false
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["tokio"]

[lib]
crate-type = ["cdylib"]

[dependencies]
ext-php-rs = "0.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tree-sitter-language-pack = { path = "../ts-pack-core", features = ["download", "serde", "config"] }

[lints]
workspace = true
