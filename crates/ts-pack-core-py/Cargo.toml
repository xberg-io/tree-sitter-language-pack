[package]
name = "ts-pack-core-py"
version = "1.8.0-rc.39"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
readme = false
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["pyo3-async-runtimes"]

[lib]
name = "_native"
crate-type = ["cdylib"]

[dependencies]
pyo3 = { version = "0.28", features = ["extension-module"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tree-sitter-language-pack = { path = "../ts-pack-core", features = ["download", "serde", "config"] }

[lints]
workspace = true
