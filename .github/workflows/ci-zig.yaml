name: CI Zig

on:
    push:
        branches: [main]
        paths:
            - "crates/ts-pack-core-ffi/**"
            - "crates/ts-pack-core/**"
            - "packages/zig/**"
            - ".github/workflows/ci-zig.yaml"
    pull_request:
        branches: [main]
        paths:
            - "crates/ts-pack-core-ffi/**"
            - "crates/ts-pack-core/**"
            - "packages/zig/**"
            - ".github/workflows/ci-zig.yaml"
    workflow_dispatch:

concurrency:
    group: ci-zig-${{ github.ref }}
    cancel-in-progress: true

env:
    CARGO_TERM_COLOR: always
    CARGO_INCREMENTAL: 0
    CARGO_PROFILE_DEV_DEBUG: 0
    RUST_BACKTRACE: short
    TSLP_LINK_MODE: static
    TSLP_LANGUAGES: python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg

permissions:
    contents: read

jobs:
    clone-vendors:
        name: Clone vendors
        if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "22"

            - name: Install tree-sitter CLI
              run: npm install -g tree-sitter-cli

            - name: Install uv
              uses: astral-sh/setup-uv@v8.2.0
              with:
                  enable-cache: true

            - name: Setup Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.14"

            - name: Install Python dependencies
              run: uv sync --no-install-project --no-install-workspace

            - name: Cache parsers
              uses: actions/cache@v5
              with:
                  path: parsers
                  key: parsers-${{ hashFiles('sources/language_definitions.json') }}
                  restore-keys: |
                      parsers-

            - name: Clone vendors
              run: |
                  mkdir -p parsers
                  uv run --script scripts/clone_vendors.py

            - name: Upload parsers
              uses: actions/upload-artifact@v7
              with:
                  name: language-parsers
                  path: parsers
                  retention-days: 1

    zig-test:
        name: Zig build + test (${{ matrix.os }})
        if: github.repository == 'kreuzberg-dev/tree-sitter-language-pack' && github.actor != 'dependabot[bot]'
        needs: [clone-vendors]
        runs-on: ${{ matrix.os }}
        timeout-minutes: 30
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, macos-latest]
        steps:
            - uses: actions/checkout@v6
            - name: Download parsers
              uses: actions/download-artifact@v8
              with:
                  name: language-parsers
                  path: parsers
            - uses: kreuzberg-dev/actions/setup-rust@v1
              with:
                  cache-key-prefix: ci-zig-${{ matrix.os }}
            - name: Build ts-pack-core-ffi
              run: cargo build --release -p ts-pack-core-ffi
            - uses: kreuzberg-dev/actions/setup-zig@v1
              with:
                  version: "0.16.0"
            - name: Build Zig package
              working-directory: packages/zig
              run: zig build -Dffi_path=../../target/release
            - name: Run Zig tests
              working-directory: packages/zig
              run: zig build test -Dffi_path=../../target/release
