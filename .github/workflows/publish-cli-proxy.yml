name: Publish CLI proxy

# Hand-written proxy packages under cli-proxy/ that download the native
# ts-pack binary from GitHub releases. Published separately from the main
# publish.yaml so binding releases and proxy releases stay decoupled.
#
# Proxy releases MUST use a tag of the form `cli-proxy-v*` (e.g. cli-proxy-v0.1.0).
# The `release: [published]` trigger fires for every release in this repo,
# including language-binding releases — the jobs below are gated so they only
# publish for the proxy's own `cli-proxy-v*` tag (or a manual workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and pack without publishing"
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish-npm:
    name: Publish ts-pack-cli to npm
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-proxy-v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org/"

      - name: Publish to npm
        working-directory: cli-proxy/npm
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}" = "true" ]; then
            npm publish --provenance --access public --dry-run
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-pypi:
    name: Publish ts-pack-cli to PyPI
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-proxy-v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Build sdist and wheel
        working-directory: cli-proxy/pypi
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --wheel --outdir dist

      - name: Publish to PyPI
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: cli-proxy/pypi/dist
