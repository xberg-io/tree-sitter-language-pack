name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0-rc.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run without publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish even if version exists"
        required: false
        type: boolean
        default: false
      targets:
        description: "Comma-separated targets or 'all'"
        required: false
        type: string
        default: "all"
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

permissions:
  contents: read

jobs:
  # ─── Prepare ───────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag:              ${{ steps.meta.outputs.tag }}
      version:          ${{ steps.meta.outputs.version }}
      npm_tag:          ${{ steps.meta.outputs.npm_tag }}
      dry_run:          ${{ steps.meta.outputs.dry_run }}
      force_republish:  ${{ steps.meta.outputs.force_republish }}
      release_crates:   ${{ steps.meta.outputs.release_crates }}
      release_python:   ${{ steps.meta.outputs.release_python }}
      release_node:     ${{ steps.meta.outputs.release_node }}
      release_wasm:     ${{ steps.meta.outputs.release_wasm }}
      release_ruby:     ${{ steps.meta.outputs.release_ruby }}
      release_go:       ${{ steps.meta.outputs.release_go }}
      release_java:     ${{ steps.meta.outputs.release_java }}
      release_elixir:   ${{ steps.meta.outputs.release_elixir }}
      release_c_ffi:    ${{ steps.meta.outputs.release_c_ffi }}
      release_php:      ${{ steps.meta.outputs.release_php }}
      release_csharp:   ${{ steps.meta.outputs.release_csharp }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare release metadata
        id: meta
        uses: kreuzberg-dev/actions/prepare-release-metadata@v1
        with:
          available-targets: "crates,python,node,wasm,ruby,go,java,elixir,c-ffi,php,csharp,homebrew"

      - name: Release info
        run: |
          {
            echo "## Release Configuration"
            echo "- **Tag**: ${{ steps.meta.outputs.tag }}"
            echo "- **Version**: ${{ steps.meta.outputs.version }}"
            echo "- **npm tag**: ${{ steps.meta.outputs.npm_tag }}"
            echo "- **Dry run**: ${{ steps.meta.outputs.dry_run }}"
            echo "- **Force republish**: ${{ steps.meta.outputs.force_republish }}"
            echo "- **Targets**: ${{ steps.meta.outputs.release_targets }}"
            echo "- **Pre-release**: ${{ steps.meta.outputs.is_prerelease }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Validate versions ──────────────────────────────────────────────
  validate-versions:
    name: Validate version consistency
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Validate versions
        uses: kreuzberg-dev/actions/validate-versions@v1
        with:
          version: ${{ needs.prepare.outputs.version }}

  # ─── Registry checks ──────────────────────────────────────────────
  check-cratesio:
    name: Check crates.io
    needs: prepare
    if: needs.prepare.outputs.release_crates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: cratesio
          package: tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-pypi:
    name: Check PyPI
    needs: prepare
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: pypi
          package: tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-npm:
    name: Check npm
    needs: prepare
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack"
          version: ${{ needs.prepare.outputs.version }}

  check-npm-wasm:
    name: Check npm (WASM)
    needs: prepare
    if: needs.prepare.outputs.release_wasm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack-wasm"
          version: ${{ needs.prepare.outputs.version }}

  check-rubygems:
    name: Check RubyGems
    needs: prepare
    if: needs.prepare.outputs.release_ruby == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

  check-maven:
    name: Check Maven Central
    needs: prepare
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: dev.kreuzberg:tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-hex:
    name: Check Hex.pm
    needs: prepare
    if: needs.prepare.outputs.release_elixir == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

  check-packagist:
    name: Check Packagist
    needs: prepare
    if: needs.prepare.outputs.release_php == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: packagist
          package: kreuzberg/tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

  check-nuget:
    name: Check NuGet
    needs: prepare
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Check if version exists
        id: check
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: nuget
          package: TreeSitterLanguagePack
          version: ${{ needs.prepare.outputs.version }}

  # ─── Clone vendors ────────────────────────────────────────────────
  clone-vendors:
    name: Clone vendors
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project

      - name: Cache parsers
        uses: actions/cache@v5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --script scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7
        with:
          name: language-parsers
          path: parsers
          retention-days: 3

  # ─── Build parser binaries ─────────────────────────────────────────
  build-parser-binaries:
    name: Build parser binaries (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64
          - os: macos-15-intel
            label: macos-x86_64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install zstd (if missing)
        shell: bash
        run: |
          if command -v zstd &>/dev/null; then
            echo "zstd already available: $(zstd --version)"
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "Installing zstd for Windows..."
            curl -fsSL "https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-v1.5.7-win64.zip" -o /tmp/zstd.zip
            unzip -q /tmp/zstd.zip -d /tmp/zstd
            cp /tmp/zstd/zstd-v1.5.7-win64/zstd.exe "$HOME/.cargo/bin/"
            echo "zstd installed: $(zstd --version)"
          else
            echo "Installing zstd via package manager..."
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              brew install zstd
            else
              sudo apt-get update && sudo apt-get install -y zstd
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get all language names
        id: langs
        shell: bash
        run: |
          LANGS=$(python3 -c "import json; d=json.load(open('sources/language_definitions.json')); print(','.join(sorted(d.keys())))")
          echo "names=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Build all parsers
        run: cargo build -p tree-sitter-language-pack --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          TSLP_LANGUAGES: ${{ steps.langs.outputs.names }}

      - name: Package parser binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          # Dynamic parser libraries are built into the OUT_DIR/libs/ by build.rs
          find target/release/build -path '*/out/libs/*' \( -name 'libtree_sitter_*.so' -o -name 'libtree_sitter_*.dylib' \) -exec cp {} staging/ \;
          echo "Packaged $(find staging/ -maxdepth 1 -type f | wc -l) parser libraries"
          find staging/ -maxdepth 1 -type f | head -20
          cd staging && tar -cf - . | zstd -19 -o "../parsers-${{ matrix.label }}.tar.zst"

      - name: Package parser binaries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          find target/release/build -path '*/out/libs/*' -name 'tree_sitter_*.dll' -exec cp {} staging/ \;
          echo "Packaged $(find staging/ -maxdepth 1 -type f | wc -l) parser libraries"
          cd staging && tar -cf - . | zstd -19 -o "../parsers-${{ matrix.label }}.tar.zst"

      - name: Upload parser binaries
        uses: actions/upload-artifact@v7
        with:
          name: parsers-${{ matrix.label }}
          path: parsers-${{ matrix.label }}.tar.zst
          retention-days: 14

  # ─── Build Python wheels ───────────────────────────────────────────
  build-python-wheels:
    name: Build Python wheel (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64
          - os: windows-latest
            label: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        # Run from packages/python so maturin picks up pyproject.toml's
        # python-packages = ["tree_sitter_language_pack"] — without this,
        # maturin builds a binary-only wheel containing just the .so plus
        # dist-info and ships no Python source code (PyPI v1.6.3 regression,
        # see #108).
        working-directory: packages/python
        # No --manifest-path: maturin reads pyproject.toml from CWD (which has
        # [tool.maturin] manifest-path) and uses [project].version from there.
        # Passing --manifest-path makes maturin walk up from the Cargo.toml's
        # parent to find pyproject.toml and pick up the stale top-level one.
        run: maturin build --release --out ../../dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: python-wheel-${{ matrix.label }}
          path: dist/*.whl
          retention-days: 14

  # ─── Build Node.js native modules ─────────────────────────────────
  build-node-native:
    name: Build Node.js (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64-gnu
            napi_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-arm64-gnu
            napi_target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: darwin-arm64
            napi_target: aarch64-apple-darwin
          - os: windows-latest
            label: win32-x64-msvc
            napi_target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: crates/ts-pack-core-node
        run: napi build --release --platform --target ${{ matrix.napi_target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native module
        uses: actions/upload-artifact@v7
        with:
          name: node-native-${{ matrix.label }}
          path: crates/ts-pack-core-node/*.node
          retention-days: 14

  # ─── Build Ruby gems ──────────────────────────────────────────────
  build-ruby-gem:
    name: Build Ruby gem (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_ruby == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      RB_SYS_CARGO_PROFILE: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ruby_platform: x86_64-linux
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            ruby_platform: aarch64-linux
          - os: macos-latest
            label: macos-arm64
            ruby_platform: arm64-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler: none
          bundler-cache: false

      - name: Install Bundler
        run: gem install bundler --no-document && bundler --version

      - name: Install Ruby dependencies
        working-directory: packages/ruby
        run: |
          bundle config set --local path vendor/bundle
          bundle check || bundle install

      - name: Compile native extension
        working-directory: packages/ruby
        timeout-minutes: 60
        run: |
          echo "Compiling native extension..."
          bundle exec rake compile
          echo "Native extension compiled successfully"
          echo "=== Native libraries ==="
          find lib -name '*.so' -o -name '*.bundle' -o -name '*.dylib' 2>/dev/null | head -20
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/packages/ruby/target

      - name: Build platform gem
        run: ruby scripts/publish/ruby/build-native-gem.rb "${{ matrix.ruby_platform }}"

      - name: Verify gem was built
        working-directory: packages/ruby
        run: |
          if ! ls ./*.gem 1>/dev/null 2>&1; then
            echo "ERROR: No gem file found" >&2
            exit 1
          fi
          echo "Gem built successfully:"
          ls -lh ./*.gem
          # Verify it's a platform gem, not a source gem
          gem spec ./*.gem | grep -i platform

      - name: Verify gem integrity
        working-directory: packages/ruby
        run: |
          for gem in ./*.gem; do
            echo "Validating: $gem"
            file "$gem"
            if ! gem spec "$gem" >/dev/null 2>&1; then
              echo "WARNING: gem spec check failed for $gem"
              if ! tar -tzf "$gem" >/dev/null 2>&1; then
                echo "ERROR: Corrupted gem file: $gem" >&2
                exit 1
              fi
            else
              echo "gem spec validation passed"
            fi
          done

      - name: Upload gem artifacts
        uses: actions/upload-artifact@v7
        with:
          name: rubygems-${{ matrix.label }}
          path: packages/ruby/*.gem
          retention-days: 14
          compression-level: 0

  # ─── Build WASM package (split into two jobs to avoid OOM) ─────────
  build-wasm:
    name: Build WASM package
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_wasm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          components: ""
          use-sccache: "true"
          install-llvm-cov: "false"

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM (web target)
        working-directory: crates/ts-pack-core-wasm
        run: wasm-pack build --target web --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: static
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"
          NUM_JOBS: "2"

      - name: Verify WASM build output
        working-directory: crates/ts-pack-core-wasm
        run: |
          if [ ! -d pkg ]; then
            echo "ERROR: pkg/ directory not created by wasm-pack" >&2
            exit 1
          fi
          echo "=== WASM build output (web) ==="
          ls -lh pkg/
          if [ ! -f pkg/ts_pack_core_wasm_bg.wasm ]; then
            echo "ERROR: WASM binary not found" >&2
            exit 1
          fi
          echo "WASM binary size: $(wc -c < pkg/ts_pack_core_wasm_bg.wasm) bytes"

      - name: Patch WASM package.json
        working-directory: crates/ts-pack-core-wasm
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          python3 -c "
          import json
          with open('pkg/package.json', 'r') as f:
              data = json.load(f)
          data['name'] = '@kreuzberg/tree-sitter-language-pack-wasm'
          data['version'] = '$VERSION'
          data['publishConfig'] = {'registry': 'https://registry.npmjs.org/', 'access': 'public'}
          data['repository'] = {'type': 'git', 'url': 'https://github.com/kreuzberg-dev/tree-sitter-language-pack'}
          data['license'] = 'MIT'
          with open('pkg/package.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print(f'Patched pkg/package.json: name={data[\"name\"]}, version={data[\"version\"]}')
          "

      - name: Upload WASM package
        uses: actions/upload-artifact@v7
        with:
          name: wasm-pkg
          path: crates/ts-pack-core-wasm/pkg/
          retention-days: 14

  # ─── Build Go FFI libraries ────────────────────────────────────────
  build-go-ffi:
    name: Build Go FFI (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_go == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install alef
        uses: kreuzberg-dev/actions/install-alef@v1

      - name: Build and package Go FFI library
        shell: bash
        run: |
          alef publish build --lang ffi --target ${{ matrix.target }}
          alef publish package --lang go --target ${{ matrix.target }} -o dist/go-ffi
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload FFI artifact
        uses: actions/upload-artifact@v7
        with:
          name: go-ffi-${{ matrix.label }}
          path: dist/go-ffi/
          retention-days: 14

  # ─── Build Java native libraries ───────────────────────────────────
  build-java-natives:
    name: Build Java natives (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install alef
        uses: kreuzberg-dev/actions/install-alef@v1

      - name: Build and stage FFI library
        shell: bash
        run: |
          alef publish build --lang ffi --target ${{ matrix.target }}
          mkdir -p dist/java-ffi/${{ matrix.platform }}/native
          find "target/${{ matrix.target }}/release" -maxdepth 1 -type f \( -name '*.so' -o -name '*.dylib' -o -name '*.dll' \) -name '*ts_pack_core_ffi*' -exec cp {} dist/java-ffi/${{ matrix.platform }}/native/ \;
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7
        with:
          name: java-natives-${{ matrix.label }}
          path: dist/java-ffi
          retention-days: 14

  # ─── Build Java package ────────────────────────────────────────────
  build-java-package:
    name: Build Java package
    needs: [prepare, validate-versions, build-java-natives]
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "25.0.2+10"
          cache: "maven"

      - name: Setup Maven
        uses: kreuzberg-dev/actions/setup-maven@v1

      - name: Download Java native artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: java-natives-*
          path: artifacts/java-natives
          merge-multiple: false

      - name: Stage Java native resources
        shell: bash
        run: |
          ARTIFACTS_DIR="artifacts/java-natives"
          RESOURCES_DIR="packages/java/src/main/resources/natives"
          mkdir -p "$RESOURCES_DIR"
          # Artifact layout: $ARTIFACTS_DIR/java-natives-{label}/{platform}/native/{libfile}
          # Two dirname levels up from the lib file gives {platform}.
          find "$ARTIFACTS_DIR" \( -name '*.so' -o -name '*.dll' -o -name '*.dylib' \) -print0 |
          while IFS= read -r -d '' f; do
            platform=$(basename "$(dirname "$(dirname "$f")")")
            mkdir -p "$RESOURCES_DIR/$platform"
            cp "$f" "$RESOURCES_DIR/$platform/"
          done
          echo "=== Staged native resources ==="
          find "$RESOURCES_DIR" -type f | sort

      - name: Verify staged native resources
        shell: bash
        run: |
          RESOURCES_DIR="packages/java/src/main/resources/natives"
          # RIDs must match the build-java-natives matrix platform values
          for rid in linux-x86_64 linux-arm64 macos-arm64 windows-x86_64; do
            if ! ls "$RESOURCES_DIR/$rid"/ts_pack_core_ffi.* "$RESOURCES_DIR/$rid"/libts_pack_core_ffi.* >/dev/null 2>&1; then
              echo "::error::Missing native lib for $rid in $RESOURCES_DIR/$rid"
              exit 1
            fi
          done
          echo "All expected native libs present."

      - name: Build and package
        working-directory: packages/java
        run: mvn clean package -DskipTests

      - name: Verify JAR contains native libs
        working-directory: packages/java
        shell: bash
        run: |
          JAR=""
          for f in target/tree-sitter-language-pack-*.jar; do
            case "$f" in *-sources.jar|*-javadoc.jar) continue ;; esac
            JAR="$f"
            break
          done
          if [ -z "$JAR" ]; then
            echo "::error::No JAR found in target/"
            exit 1
          fi
          echo "Checking JAR: $JAR"
          COUNT=$(jar tf "$JAR" | grep -cE '^natives/[^/]+/(lib)?ts_pack_core_ffi\.(so|dll|dylib)$' || true)
          echo "Native libs found in JAR: $COUNT"
          if [ "$COUNT" -eq 0 ]; then
            echo "::error::JAR contains no natives/ entries — native staging failed"
            jar tf "$JAR" | grep -E '^natives/' || echo "(no natives/ entries at all)"
            exit 1
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: maven-packages
          path: packages/java/target/*.jar
          retention-days: 14

  # ─── Build Elixir NIFs ────────────────────────────────────────────
  build-elixir-nifs:
    name: Build Elixir NIF (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_elixir == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Download parsers
        uses: actions/download-artifact@v8
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build Elixir NIF
        working-directory: packages/elixir/native/tree_sitter_language_pack_nif
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Package NIF libraries (NIF 2.16)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.16"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.so"
          fi

          mkdir -p dist/elixir
          # Underscore name (matches Cargo output)
          ARTIFACT_UNDERSCORE="libtree_sitter_language_pack_nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          # Hyphen name (matches what RustlerPrecompiled expects from crate: "ts-pack-elixir")
          ARTIFACT_HYPHEN="libtree-sitter-language-pack-nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"

          # ts-pack-elixir is a standalone workspace, output is in packages/elixir/target/
          LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            find . -name "${LIB_NAME}" -type f 2>/dev/null || true
            exit 1
          fi

          # Create both underscore and hyphen tarballs
          cp "$LIB_PATH" "${ARTIFACT_UNDERSCORE}"
          tar -czf "dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz" "${ARTIFACT_UNDERSCORE}"
          echo "Created: dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz"

          cp "$LIB_PATH" "${ARTIFACT_HYPHEN}"
          tar -czf "dist/elixir/${ARTIFACT_HYPHEN}.tar.gz" "${ARTIFACT_HYPHEN}"
          echo "Created: dist/elixir/${ARTIFACT_HYPHEN}.tar.gz"

      - name: Package NIF libraries (NIF 2.17)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.17"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.so"
          fi

          ARTIFACT_UNDERSCORE="libtree_sitter_language_pack_nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          ARTIFACT_HYPHEN="libtree-sitter-language-pack-nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"

          # ts-pack-elixir is a standalone workspace, output is in packages/elixir/target/
          LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            find . -name "${LIB_NAME}" -type f 2>/dev/null || true
            exit 1
          fi

          cp "$LIB_PATH" "${ARTIFACT_UNDERSCORE}"
          tar -czf "dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz" "${ARTIFACT_UNDERSCORE}"
          echo "Created: dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz"

          cp "$LIB_PATH" "${ARTIFACT_HYPHEN}"
          tar -czf "dist/elixir/${ARTIFACT_HYPHEN}.tar.gz" "${ARTIFACT_HYPHEN}"
          echo "Created: dist/elixir/${ARTIFACT_HYPHEN}.tar.gz"

      - name: Upload NIF artifacts
        uses: actions/upload-artifact@v7
        with:
          name: elixir-${{ matrix.label }}
          path: dist/elixir/*.tar.gz
          if-no-files-found: error
          retention-days: 14

