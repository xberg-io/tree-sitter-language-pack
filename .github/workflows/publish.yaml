name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v1.0.0-rc.2)"
        required: true
        type: string
      dry_run:
        description: "Dry run without publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish even if version exists"
        required: false
        type: boolean
        default: false
      targets:
        description: "Comma-separated targets or 'all'"
        required: false
        type: string
        default: "all"
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.tag || github.event.release.tag_name || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: short

permissions:
  contents: read

jobs:
  # ─── Prepare ───────────────────────────────────────────────────────
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      checkout_ref: ${{ steps.ref.outputs.checkout_ref }}
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      release_crates: ${{ steps.meta.outputs.release_crates }}
      release_python: ${{ steps.meta.outputs.release_python }}
      release_node: ${{ steps.meta.outputs.release_node }}
      release_wasm: ${{ steps.meta.outputs.release_wasm }}
      release_ruby: ${{ steps.meta.outputs.release_ruby }}
      release_go: ${{ steps.meta.outputs.release_go }}
      release_java: ${{ steps.meta.outputs.release_java }}
      release_elixir: ${{ steps.meta.outputs.release_elixir }}
      release_c_ffi: ${{ steps.meta.outputs.release_c_ffi }}
      release_php: ${{ steps.meta.outputs.release_php }}
      release_csharp: ${{ steps.meta.outputs.release_csharp }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
      release_dart: ${{ steps.meta.outputs.release_dart }}
      release_swift: ${{ steps.meta.outputs.release_swift }}
      release_zig: ${{ steps.meta.outputs.release_zig }}
      release_kotlin_android: ${{ steps.meta.outputs.release_kotlin }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Prepare release metadata
        id: meta
        uses: kreuzberg-dev/actions/prepare-release-metadata@v1
        with:
          available-targets: "crates,python,node,wasm,ruby,go,java,elixir,c-ffi,php,csharp,homebrew,dart,swift,zig,kotlin"

      # In dry-run we may not yet have the tag pushed; check out the dispatch
      # SHA instead so jobs can still validate the workflow against current
      # workspace contents. Real publish keeps using the immutable tag.
      - name: Resolve checkout ref
        id: ref
        env:
          DRY_RUN: ${{ steps.meta.outputs.dry_run }}
          TAG: ${{ steps.meta.outputs.tag }}
          DISPATCH_SHA: ${{ github.sha }}
        run: |
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "checkout_ref=${DISPATCH_SHA}" >> "$GITHUB_OUTPUT"
          else
            echo "checkout_ref=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Release info
        run: |
          {
            echo "## Release Configuration"
            echo "- **Tag**: ${{ steps.meta.outputs.tag }}"
            echo "- **Version**: ${{ steps.meta.outputs.version }}"
            echo "- **npm tag**: ${{ steps.meta.outputs.npm_tag }}"
            echo "- **Dry run**: ${{ steps.meta.outputs.dry_run }}"
            echo "- **Force republish**: ${{ steps.meta.outputs.force_republish }}"
            echo "- **Targets**: ${{ steps.meta.outputs.release_targets }}"
            echo "- **Pre-release**: ${{ steps.meta.outputs.is_prerelease }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ─── Validate versions ──────────────────────────────────────────────
  validate-versions:
    name: Validate version consistency
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Validate versions
        uses: kreuzberg-dev/actions/validate-versions@v1
        with:
          version: ${{ needs.prepare.outputs.version }}

  # ─── Registry checks ──────────────────────────────────────────────
  check-registries:
    name: Check registries
    needs: prepare
    uses: kreuzberg-dev/actions/.github/workflows/reusable-check-registries.yml@v1
    with:
      version: ${{ needs.prepare.outputs.version }}
      registries: |
        [
          {
            "name": "cratesio",
            "registry": "cratesio",
            "package": "tree-sitter-language-pack"
          },
          {
            "name": "pypi",
            "registry": "pypi",
            "package": "tree-sitter-language-pack"
          },
          {
            "name": "npm",
            "registry": "npm",
            "package": "@kreuzberg/tree-sitter-language-pack"
          },
          {
            "name": "npm-wasm",
            "registry": "npm",
            "package": "@kreuzberg/tree-sitter-language-pack-wasm"
          },
          {
            "name": "rubygems",
            "registry": "rubygems",
            "package": "tree_sitter_language_pack"
          },
          {
            "name": "maven",
            "registry": "maven",
            "package": "dev.kreuzberg:tree-sitter-language-pack"
          },
          {
            "name": "hex",
            "registry": "hex",
            "package": "tree_sitter_language_pack"
          },
          {
            "name": "packagist",
            "registry": "packagist",
            "package": "kreuzberg/tree-sitter-language-pack"
          },
          {
            "name": "nuget",
            "registry": "nuget",
            "package": "TreeSitterLanguagePack"
          },
          {
            "name": "homebrew",
            "registry": "homebrew",
            "package": "ts-pack",
            "tap-repo": "kreuzberg-dev/homebrew-tap"
          },
          {
            "name": "pub",
            "registry": "pub",
            "package": "tree_sitter_language_pack"
          },
          {
            "name": "spi-swift",
            "registry": "swift",
            "package": "kreuzberg-dev/tree-sitter-language-pack",
            "repo": "kreuzberg-dev/tree-sitter-language-pack"
          },
          {
            "name": "zig",
            "registry": "zig",
            "package": "tree_sitter_language_pack",
            "repo": "kreuzberg-dev/tree-sitter-language-pack"
          },
          {
            "name": "maven-kotlin-android",
            "registry": "maven",
            "package": "dev.kreuzberg.tslp:tslp-android"
          }
        ]

  # ─── Clone vendors ────────────────────────────────────────────────
  clone-vendors:
    name: Clone vendors
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0

      - name: Install tree-sitter CLI
        run: npm install -g tree-sitter-cli

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --no-install-project --no-install-workspace

      - name: Cache parsers
        uses: actions/cache@v5.0.5
        with:
          path: parsers
          key: parsers-${{ hashFiles('sources/language_definitions.json') }}
          restore-keys: |
            parsers-

      - name: Clone vendors
        run: |
          mkdir -p parsers
          uv run --script scripts/clone_vendors.py

      - name: Upload parsers
        uses: actions/upload-artifact@v7.0.1
        with:
          name: language-parsers
          path: parsers
          retention-days: 3

  # ─── Build parser-sources bundle (for from-source installs, fix #122) ─
  build-parser-sources:
    name: Build parser-sources bundle
    needs: [prepare, validate-versions, clone-vendors]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Pack parser sources
        uses: kreuzberg-dev/actions/pack-source-bundle@v1
        with:
          paths: |
            parsers
            sources
          excludes: |
            parsers/*/grammar.js
            parsers/*/grammar.json
            parsers/*/node-types.json
            parsers/*/binding.gyp
            parsers/*/package.json
            parsers/*/.gitignore
            parsers/*/test
          output: dist/parser-sources-${{ needs.prepare.outputs.version }}.tar.zst

      - name: Upload to GitHub Release
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: |
            dist/parser-sources-*.tar.zst
            dist/parser-sources-*.tar.zst.sha256
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Build parser binaries ─────────────────────────────────────────
  build-parser-binaries:
    name: Build parser binaries (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64
          - os: macos-15-intel
            label: macos-x86_64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install zstd (if missing)
        shell: bash
        run: |
          if command -v zstd &>/dev/null; then
            echo "zstd already available: $(zstd --version)"
          elif [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "Installing zstd for Windows..."
            curl -fsSL "https://github.com/facebook/zstd/releases/download/v1.5.7/zstd-v1.5.7-win64.zip" -o /tmp/zstd.zip
            unzip -q /tmp/zstd.zip -d /tmp/zstd
            cp /tmp/zstd/zstd-v1.5.7-win64/zstd.exe "$HOME/.cargo/bin/"
            echo "zstd installed: $(zstd --version)"
          else
            echo "Installing zstd via package manager..."
            if [[ "$RUNNER_OS" == "macOS" ]]; then
              brew install zstd
            else
              sudo apt-get update && sudo apt-get install -y zstd
            fi
          fi

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Get all language names
        id: langs
        shell: bash
        run: |
          LANGS=$(python3 -c "import json; d=json.load(open('sources/language_definitions.json')); print(','.join(sorted(d.keys())))")
          echo "names=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Build all parsers
        run: cargo build -p tree-sitter-language-pack --release
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: dynamic
          TSLP_LANGUAGES: ${{ steps.langs.outputs.names }}

      - name: Package parser binaries (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          # Dynamic parser libraries are built into the OUT_DIR/libs/ by build.rs
          find target/release/build -path '*/out/libs/*' \( -name 'libtree_sitter_*.so' -o -name 'libtree_sitter_*.dylib' \) -exec cp {} staging/ \;
          echo "Packaged $(find staging/ -maxdepth 1 -type f | wc -l) parser libraries"
          find staging/ -maxdepth 1 -type f | head -20
          cd staging && tar -cf - . | zstd -19 -o "../parsers-${{ matrix.label }}.tar.zst"

      - name: Package parser binaries (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          find target/release/build -path '*/out/libs/*' -name 'tree_sitter_*.dll' -exec cp {} staging/ \;
          echo "Packaged $(find staging/ -maxdepth 1 -type f | wc -l) parser libraries"
          cd staging && tar -cf - . | zstd -19 -o "../parsers-${{ matrix.label }}.tar.zst"

      - name: Upload parser binaries
        uses: actions/upload-artifact@v7.0.1
        with:
          name: parsers-${{ matrix.label }}
          path: parsers-${{ matrix.label }}.tar.zst
          retention-days: 14

  # ─── Build Python wheels ───────────────────────────────────────────
  build-python-wheels:
    name: Build Python wheel (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_python == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
          - os: macos-latest
            label: macos-arm64
          - os: macos-15-intel
            label: macos-x86_64
          - os: windows-latest
            label: windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        # Run from packages/python so maturin picks up pyproject.toml's
        # python-packages = ["tree_sitter_language_pack"] — without this,
        # maturin builds a binary-only wheel containing just the .so plus
        # dist-info and ships no Python source code (PyPI v1.6.3 regression,
        # see #108).
        working-directory: packages/python
        # No --manifest-path: maturin reads pyproject.toml from CWD (which has
        # [tool.maturin] manifest-path) and uses [project].version from there.
        # Passing --manifest-path makes maturin walk up from the Cargo.toml's
        # parent to find pyproject.toml and pick up the stale top-level one.
        run: maturin build --release --out ../../dist
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload wheel
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-wheel-${{ matrix.label }}
          path: dist/*.whl
          retention-days: 14

  # ─── Build Python sdist ────────────────────────────────────────────
  build-python-sdist:
    name: Build Python sdist
    needs: [prepare, validate-versions, clone-vendors, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_python == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - name: Build sdist
        uses: kreuzberg-dev/actions/build-python-sdist@v1
        with:
          package-dir: packages/python
          output-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - name: Upload sdist
        uses: actions/upload-artifact@v7.0.1
        with:
          name: python-sdist
          path: dist/*.tar.gz
          retention-days: 14

      # Smoke: install the just-built sdist with parsers/ hidden from the
      # build, so build.rs has to fetch the source bundle. Proves the #122
      # codepath works end-to-end before we cut a release.
      - name: Pack a smoke source bundle
        id: smoke-bundle
        uses: kreuzberg-dev/actions/pack-source-bundle@v1
        with:
          paths: |
            parsers
            sources
          excludes: |
            parsers/*/grammar.js
            parsers/*/grammar.json
            parsers/*/node-types.json
            parsers/*/binding.gyp
            parsers/*/package.json
            parsers/*/.gitignore
            parsers/*/test
          output: /tmp/parser-sources.tar.zst

      - name: Smoke install from sdist (force source bundle download)
        env:
          BUNDLE: ${{ steps.smoke-bundle.outputs.bundle-path }}
        run: |
          set -euo pipefail
          # Hide parsers/ so build.rs can't find them locally — emulates sdist install.
          mv parsers /tmp/parsers-bak
          python -m venv /tmp/sdist-smoke
          # shellcheck disable=SC1091
          source /tmp/sdist-smoke/bin/activate
          pip install --upgrade pip
          # --no-build-isolation needs every PEP 517 backend present in the venv
          # ahead of time: maturin for tree-sitter-language-pack itself, setuptools
          # + wheel for tree-sitter's sdist (a transitive build dep).
          pip install 'maturin>=1,<2' 'setuptools>=68' wheel
          TSLP_LANGUAGES="python,rust,javascript" \
          TSLP_LINK_MODE=static \
          TSLP_SOURCE_BUNDLE_URL="file://${BUNDLE}" \
            pip install --no-binary :all: --no-build-isolation \
              dist/tree_sitter_language_pack-*.tar.gz
          python -c "
          import tree_sitter_language_pack as t
          p = t.get_parser('python')
          tree = p.parse('def foo(): pass')
          root = tree.root_node()
          kind = root.kind()
          assert kind == 'module', kind
          print('OK:', kind)
          "
          # Restore parsers/ for any subsequent steps.
          mv /tmp/parsers-bak parsers

  # ─── Build Node.js native modules ─────────────────────────────────
  build-node-native:
    name: Build Node.js (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_node == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64-gnu
            napi_target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-arm64-gnu
            napi_target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: darwin-arm64
            napi_target: aarch64-apple-darwin
          - os: macos-15-intel
            label: darwin-x64
            napi_target: x86_64-apple-darwin
          - os: windows-latest
            label: win32-x64-msvc
            napi_target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            label: win32-arm64-msvc
            napi_target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Build native module
        working-directory: crates/ts-pack-core-node
        run: napi build --release --platform --target ${{ matrix.napi_target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: Upload native module
        uses: actions/upload-artifact@v7.0.1
        with:
          name: node-native-${{ matrix.label }}
          path: crates/ts-pack-core-node/*.node
          retention-days: 14

  # ─── Build Ruby gems ──────────────────────────────────────────────
  build-ruby-gem:
    name: Build Ruby gem (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_ruby == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    env:
      RB_SYS_CARGO_PROFILE: release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            ruby_platform: x86_64-linux
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            ruby_platform: aarch64-linux
          - os: macos-latest
            label: macos-arm64
            ruby_platform: arm64-darwin
          - os: macos-15-intel
            label: macos-x86_64
            ruby_platform: x86_64-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.310.0
        with:
          ruby-version: "3.4"
          bundler: none
          bundler-cache: false

      - name: Install Bundler
        run: gem install bundler --no-document && bundler --version

      - name: Install Ruby dependencies
        working-directory: packages/ruby
        run: |
          bundle config set --local path vendor/bundle
          bundle check || bundle install

      - name: Rewrite native dependencies
        uses: kreuzberg-dev/actions/rewrite-native-deps@v1
        with:
          lang: ruby

      - name: Compile native extension
        working-directory: packages/ruby
        timeout-minutes: 60
        run: |
          echo "Compiling native extension..."
          bundle exec rake compile
          echo "Native extension compiled successfully"
          echo "=== Native libraries ==="
          find lib -name '*.so' -o -name '*.bundle' -o -name '*.dylib' 2>/dev/null | head -20
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/packages/ruby/target

      - name: Build platform gem
        run: ruby scripts/publish/ruby/build-native-gem.rb "${{ matrix.ruby_platform }}"

      - name: Verify gem was built
        working-directory: packages/ruby
        run: |
          if ! ls ./*.gem 1>/dev/null 2>&1; then
            echo "ERROR: No gem file found" >&2
            exit 1
          fi
          echo "Gem built successfully:"
          ls -lh ./*.gem
          # Verify it's a platform gem, not a source gem
          gem spec ./*.gem | grep -i platform

      - name: Verify gem integrity
        working-directory: packages/ruby
        run: |
          for gem in ./*.gem; do
            echo "Validating: $gem"
            file "$gem"
            if ! gem spec "$gem" >/dev/null 2>&1; then
              echo "WARNING: gem spec check failed for $gem"
              if ! tar -tzf "$gem" >/dev/null 2>&1; then
                echo "ERROR: Corrupted gem file: $gem" >&2
                exit 1
              fi
            else
              echo "gem spec validation passed"
            fi
          done

      - name: Upload gem artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: rubygems-${{ matrix.label }}
          path: packages/ruby/*.gem
          retention-days: 14
          compression-level: 0

  # ─── Build WASM package (split into two jobs to avoid OOM) ─────────
  build-wasm:
    name: Build WASM package
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_wasm == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Free disk space (Linux)
        uses: kreuzberg-dev/actions/free-disk-space-linux@v1

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          components: ""
          # sccache server competes for RAM with the compile and was correlating
          # with consistent OOM kills (SIGTERM at exit 143) on the free 16GB runner.
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Install WASI SDK
        uses: kreuzberg-dev/actions/install-wasi-sdk@v1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Add swap (best-effort; avoid OOM during 305-grammar static link)
        shell: bash
        run: |
          # Best-effort: free runners often already have swap, and fallocate
          # can fail on some FS layouts. Don't fail the job if swap isn't
          # creatable — we still rely on CARGO_BUILD_JOBS=1 to keep peak RAM low.
          set +e
          # Fallocate first, dd as fallback (slower but works on more filesystems).
          if sudo fallocate -l 6G /swapfile 2>/dev/null; then
            :
          elif sudo dd if=/dev/zero of=/swapfile bs=1M count=6144 status=none 2>/dev/null; then
            :
          else
            echo "swap allocation failed; continuing without extra swap"
            free -h
            exit 0
          fi
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile >/dev/null
          sudo swapon /swapfile
          free -h

      - name: Build WASM (nodejs and web targets)
        working-directory: crates/ts-pack-core-wasm
        run: |
          # Build both nodejs (for Node.js consumers) and web (for bundlers/browser)
          wasm-pack build --target nodejs --out-dir pkg/nodejs --release
          wasm-pack build --target web --out-dir pkg/web --release

          # Copy nodejs as the primary output for npm publish (Node.js is the primary consumer)
          cp -r pkg/nodejs/* pkg/
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LINK_MODE: static
          # Curated subset of grammars compiled into the WASM bundle.
          # Compiling all 305 grammars statically OOM-killed the free 16GB
          # runner during dependency-LLVM passes (consistent SIGTERM at exit
          # 143 around 7-15 min in). This list covers the most-used languages;
          # expand it once a larger CI runner is provisioned.
          # NOTE: jsx is part of the javascript grammar (no separate jsx grammar exists);
          # it is omitted here to avoid a build.rs warning about an unknown language.
          TSLP_LANGUAGES: "python,javascript,typescript,tsx,rust,go,java,c,cpp,csharp,ruby,php,html,css,json,yaml,toml,markdown,bash,sql,lua,scala,kotlin,swift,dockerfile,vue,svelte,elixir,erlang,haskell,zig"
          CARGO_PROFILE_RELEASE_LTO: "false"
          CARGO_PROFILE_RELEASE_CODEGEN_UNITS: "16"

      - name: Verify WASM build output
        working-directory: crates/ts-pack-core-wasm
        run: |
          if [ ! -d pkg ]; then
            echo "ERROR: pkg/ directory not created by wasm-pack" >&2
            exit 1
          fi
          echo "=== WASM build output (nodejs primary) ==="
          ls -lh pkg/
          if [ ! -f pkg/ts_pack_core_wasm_bg.wasm ]; then
            echo "ERROR: WASM binary not found" >&2
            exit 1
          fi
          echo "WASM binary size: $(wc -c < pkg/ts_pack_core_wasm_bg.wasm) bytes"
          echo "=== Checking for bundler-only imports ==="
          if grep -q 'from "env"' pkg/ts_pack_core_wasm.js; then
            echo "ERROR: Found bundler-only imports in main JS" >&2
            grep 'from "env"' pkg/ts_pack_core_wasm.js | head -5
            exit 1
          fi
          echo "OK: No bundler-only imports detected"

      - name: Patch WASM package.json
        working-directory: crates/ts-pack-core-wasm
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          python3 -c "
          import json
          with open('pkg/package.json', 'r') as f:
              data = json.load(f)
          data['name'] = '@kreuzberg/tree-sitter-language-pack-wasm'
          data['version'] = '$VERSION'
          data['publishConfig'] = {'registry': 'https://registry.npmjs.org/', 'access': 'public'}
          data['repository'] = {'type': 'git', 'url': 'https://github.com/kreuzberg-dev/tree-sitter-language-pack'}
          data['license'] = 'MIT'
          # Ensure Node.js is the primary entry point
          data['main'] = 'ts_pack_core_wasm.js'
          data['module'] = 'ts_pack_core_wasm.js'
          with open('pkg/package.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          print(f'Patched pkg/package.json: name={data[\"name\"]}, version={data[\"version\"]}')
          "

      - name: Upload WASM package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: wasm-pkg
          path: crates/ts-pack-core-wasm/pkg/
          retention-days: 14

  # ─── Build Go FFI libraries ────────────────────────────────────────
  build-go-ffi:
