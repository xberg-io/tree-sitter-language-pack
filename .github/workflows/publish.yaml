          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
