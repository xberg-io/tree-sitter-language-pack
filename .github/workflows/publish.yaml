            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            label: windows-aarch64
            target: aarch64-pc-windows-msvc
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

