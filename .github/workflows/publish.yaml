  # ─── Build PHP PIE package ──────────────────────────────────────────
  build-php-extension:
    name: Build PHP PIE binary (php${{ matrix.php }} ${{ matrix.platform.label }})
    needs: [prepare, validate-versions, clone-vendors, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_php == 'true' }}
    runs-on: ${{ matrix.platform.os }}
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        php: ["8.2", "8.3", "8.4", "8.5"]
        platform:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-arm64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
          # windows-aarch64 omitted: ext-php-rs C wrapper compilation fails on
          # Windows ARM64 because PHP SDK headers (mmintrin.h) are X86-only.
        exclude:
          - php: "8.5"
            platform:
              label: windows-x86_64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup PHP
        uses: kreuzberg-dev/actions/setup-php@v1 # v1
        with:
          php-version: ${{ matrix.php }}

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1 # v1
        with:
          cache-key-prefix: publish-php-${{ matrix.platform.label }}-php${{ matrix.php }}
          toolchain: stable

      - name: Install alef
        uses: kreuzberg-dev/actions/install-alef@v1 # v1

      - name: Build PHP extension
        uses: kreuzberg-dev/actions/build-php-extension@v1 # v1
        with:
          crate-name: ts-pack-core-php
          lib-name: ts_pack_core_php
          php-version: ${{ matrix.php }}
          php-ts: nts
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - name: Determine Windows compiler
        if: runner.os == 'Windows'
        id: wincompiler
        shell: pwsh
        run: |
          $compiler = switch ('${{ matrix.php }}') {
            '8.2' { 'vs16' }
            '8.3' { 'vs16' }
            '8.4' { 'vs17' }
            '8.5' { 'vs17' }
            default { 'vs17' }
          }
          "compiler=$compiler" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Package PIE archive
        uses: kreuzberg-dev/actions/package-php-pie@v1 # v1
        with:
          php-version: ${{ matrix.php }}
          php-ts: nts
          target: ${{ matrix.platform.target }}
          windows-compiler: ${{ steps.wincompiler.outputs.compiler }}
          version: ${{ needs.prepare.outputs.version }}
          output-dir: dist/php-package

      - name: Upload PHP PIE package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: php-package-${{ matrix.platform.label }}-php${{ matrix.php }}
          path: |
            dist/php-package/php_*.tgz
            dist/php-package/php_*.tgz.sha256
            dist/php-package/php_*.zip
            dist/php-package/php_*.zip.sha256
          retention-days: 14

  # ─── Build C# native libraries ──────────────────────────────────────
  build-csharp-native:
    name: Build C# native (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            rid: linux-arm64
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            rid: osx-arm64
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
            rid: osx-x64
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            rid: win-x64
          - os: windows-11-arm
            label: windows-aarch64
            target: aarch64-pc-windows-msvc
            rid: win-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build C# native library
        uses: kreuzberg-dev/actions/build-csharp-natives@v1
        with:
          target: ${{ matrix.target }}
          crate-name: ts-pack-core-ffi
          lib-name: ts_pack_core_ffi
          rid: ${{ matrix.rid }}
          output-dir: dist/csharp-ffi
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: csharp-natives-${{ matrix.label }}
          path: dist/csharp-ffi
          retention-days: 14

  # ─── Build C# NuGet package ─────────────────────────────────────────
  build-csharp-package:
    name: Build C# NuGet package
    needs: [prepare, validate-versions, build-csharp-native]
    if: needs.prepare.outputs.release_csharp == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "10.0"

      - name: Download C# native artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: csharp-natives-*
          path: artifacts/csharp-natives
          merge-multiple: true

      - name: Stage native assets
        shell: bash
        run: |
          RUNTIMES_DIR="packages/csharp/TreeSitterLanguagePack/runtimes"
          mkdir -p "$RUNTIMES_DIR"
          # Each artifact contains {rid}/native/*.{so,dylib,dll}; merge-multiple: true
          # already flattened them so artifacts/csharp-natives/ holds rid subdirs directly.
          if [[ -d artifacts/csharp-natives ]]; then
            cp -r artifacts/csharp-natives/* "$RUNTIMES_DIR/"
          fi
          echo "=== Staged native runtimes ==="
          find "$RUNTIMES_DIR" -type f | head -20

      - name: Build and pack NuGet
        working-directory: packages/csharp/TreeSitterLanguagePack
        run: dotnet pack TreeSitterLanguagePack.csproj -c Release

      - name: Upload NuGet package
        uses: actions/upload-artifact@v7.0.1
        with:
          name: nuget-packages
          path: packages/csharp/TreeSitterLanguagePack/bin/Release/*.nupkg
          retention-days: 14

  # ─── Upload to GitHub Release: parser binaries ─────────────────────
  upload-parser-binaries:
    name: Upload parser binaries to GitHub Release
    needs: [prepare, validate-versions, build-parser-binaries]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.build-parser-binaries.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parser binary artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: parsers-*
          path: dist/parsers
          merge-multiple: true

      - name: Generate parsers.json manifest
        run: |
          python3 -c "
          import json, hashlib, os, subprocess

          version = '${{ needs.prepare.outputs.version }}'
          base_url = 'https://github.com/kreuzberg-dev/tree-sitter-language-pack/releases/download/v' + version
          defs = json.load(open('sources/language_definitions.json'))

          platforms = {}
          for f in sorted(os.listdir('dist/parsers')):
              if f.startswith('parsers-') and f.endswith('.tar.zst'):
                  path = os.path.join('dist/parsers', f)
                  label = f.replace('parsers-', '').replace('.tar.zst', '')
                  sha = hashlib.sha256(open(path, 'rb').read()).hexdigest()
                  size = os.path.getsize(path)
                  platforms[label] = {
                      'url': base_url + '/' + f,
                      'sha256': sha,
                      'size': size,
                  }

          languages = {}
          for name in sorted(defs.keys()):
              languages[name] = {'group': 'all', 'size': 0}

          manifest = {
              'version': version,
              'platforms': platforms,
              'languages': languages,
              'groups': {'all': sorted(defs.keys())},
          }

          with open('dist/parsers/parsers.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print(f'Generated parsers.json with {len(platforms)} platforms and {len(languages)} languages')
          "

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: |
            dist/parsers/parsers-*.tar.zst
            dist/parsers/parsers.json
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Upload to GitHub Release: Go FFI ──────────────────────────────
  upload-go-release:
    name: Upload Go FFI to GitHub Release
    needs: [prepare, validate-versions, build-go-ffi]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_go == 'true' &&
      needs.build-go-ffi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download Go FFI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: go-ffi-*
          path: dist/go
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          # alef publish package emits tree-sitter-language-pack-ffi-v<ver>-<platform>.tar.gz
          artifacts: "dist/go/tree-sitter-language-pack-ffi-*.tar.gz"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Upload to GitHub Release: C FFI ───────────────────────────────
  upload-c-ffi-release:
    name: Upload C FFI to GitHub Release
    needs: [prepare, validate-versions, build-c-ffi]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_c_ffi == 'true' &&
      needs.build-c-ffi.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download C FFI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: c-ffi-*
          path: dist/c-ffi
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          # alef publish package emits tree-sitter-language-pack-ffi-v<ver>-<target>.tar.gz
          artifacts: "dist/c-ffi/tree-sitter-language-pack-ffi-*.tar.gz"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Upload to GitHub Release: Elixir NIFs ────────────────────────
  upload-elixir-release:
    name: Upload Elixir NIFs to GitHub Release
    needs: [prepare, validate-versions, build-elixir-nifs]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_elixir == 'true' &&
      needs.build-elixir-nifs.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download Elixir NIF artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: elixir-*
          path: dist/elixir
          merge-multiple: true

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --draft --title "Release $TAG"

      - name: Upload Elixir NIF artifacts
        uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/elixir
          assets: "*.tar.gz"

  # ─── Publish Rust crates ───────────────────────────────────────────
  publish-crates:
    name: Publish Rust crates
    needs: [prepare, validate-versions, clone-vendors, check-registries]
    if: |
      always() &&
      needs.prepare.outputs.release_crates == 'true' &&
      needs.validate-versions.result == 'success' &&
      needs.clone-vendors.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).cratesio != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Publish crates
        uses: kreuzberg-dev/actions/publish-crates@v1
        with:
          crates: "tree-sitter-language-pack ts-pack-cli"
          version: ${{ needs.prepare.outputs.version }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  # ─── Publish Python to PyPI ────────────────────────────────────────
  publish-pypi:
    name: Publish Python to PyPI
    needs: [prepare, validate-versions, check-registries, build-python-wheels, build-python-sdist]
    if: |
      always() &&
      needs.prepare.outputs.release_python == 'true' &&
      needs.build-python-wheels.result == 'success' &&
      needs.build-python-sdist.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).pypi != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8.0.1
        with:
          path: dist
          pattern: python-wheel-*
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8.0.1
        with:
          name: python-sdist
          path: dist

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## PyPI Dry Run"
            echo "Wheels staged for PyPI:"
            echo '```'
            ls -1 dist/*.whl
            echo '```'
            echo "Sdist staged for PyPI:"
            echo '```'
            ls -1 dist/*.tar.gz
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to PyPI
        uses: kreuzberg-dev/actions/publish-pypi@v1
        with:
          packages-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  # ─── Publish Node.js to npm ────────────────────────────────────────
  publish-node:
    name: Publish Node.js to npm
    needs: [prepare, validate-versions, check-registries, build-node-native]
    if: |
      always() &&
      needs.prepare.outputs.release_node == 'true' &&
      needs.build-node-native.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).npm != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install NAPI-RS CLI
        run: npm install -g @napi-rs/cli

      - name: Download all native modules
        uses: actions/download-artifact@v8.0.1
        with:
          path: crates/ts-pack-core-node/artifacts
          pattern: node-native-*
          merge-multiple: true

      - name: Prepare platform packages
        working-directory: crates/ts-pack-core-node
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -name '*.node' -type f
          echo ""
          napi create-npm-dirs --npm-dir npm
          napi artifacts --build-output-dir artifacts --npm-dir npm
          echo "=== Generated platform packages ==="
          find npm -name '*.node' -type f

      - name: Pack platform packages
        working-directory: crates/ts-pack-core-node/npm
        run: |
          for dir in ./*/; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm pack && mv ./*.tgz ..)
            fi
          done
          echo "=== Packed tarballs ==="
          ls -lh ./*.tgz

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        working-directory: crates/ts-pack-core-node
        run: |
          {
            echo "## npm Dry Run"
            echo "Platform packages staged:"
            echo '```'
            find npm -name '*.node' -type f
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check npm before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack"
          version: ${{ needs.prepare.outputs.version }}

      - name: Publish platform packages to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          packages-dir: crates/ts-pack-core-node/npm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ inputs.dry_run }}

      - name: Publish main package to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/ts-pack-core-node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ inputs.dry_run }}

  # ─── Publish WASM to npm ───────────────────────────────────────────
  publish-wasm:
    name: Publish WASM to npm
    needs: [prepare, validate-versions, check-registries, build-wasm, publish-node]
    if: |
      always() &&
      needs.prepare.outputs.release_wasm == 'true' &&
      needs.build-wasm.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results)['npm-wasm'] != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Download WASM package
        uses: actions/download-artifact@v8.0.1
        with:
          name: wasm-pkg
          path: crates/ts-pack-core-wasm/pkg

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## npm WASM Dry Run"
            echo "WASM package staged for npm:"
            echo '```'
            ls -1 crates/ts-pack-core-wasm/pkg/
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check npm before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack-wasm"
          version: ${{ needs.prepare.outputs.version }}

      - name: Publish to npm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-npm@v1
        with:
          package-dir: crates/ts-pack-core-wasm/pkg
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          provenance: "true"
          dry-run: ${{ inputs.dry_run }}

      - name: Wait for npm indexing
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@kreuzberg/tree-sitter-language-pack-wasm"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "20"

  # ─── Publish Ruby gems ────────────────────────────────────────────
  publish-rubygems:
    name: Publish Ruby gems
    needs: [prepare, validate-versions, check-registries, build-ruby-gem]
    if: |
      always() &&
      needs.prepare.outputs.release_ruby == 'true' &&
      needs.build-ruby-gem.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).rubygems != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.310.0
        with:
          ruby-version: "3.4"
          bundler: none
          bundler-cache: false

      - name: Download Ruby gem artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: rubygems-*
          path: dist
          merge-multiple: true

      - name: Rewrite native dependencies
        uses: kreuzberg-dev/actions/rewrite-native-deps@v1
        with:
          lang: ruby

      - name: Build source gem (fallback for unsupported platforms)
        working-directory: packages/ruby
        run: |
          gem build ./*.gemspec
          cp ./*.gem ../../dist/ 2>/dev/null || true
        env:
          PROJECT_ROOT: ${{ github.workspace }}

      - name: List all gems for publishing
        working-directory: dist
        run: |
          echo "=== All gems to publish ==="
          ls -lh tree_sitter_language_pack-*.gem 2>/dev/null || echo "(no gems found)"
          gem_count=$(find . -maxdepth 1 -name 'tree_sitter_language_pack-*.gem' -print | wc -l)
          echo "Total gems: $gem_count"

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## RubyGems Dry Run"
            echo "Gems staged for RubyGems:"
            echo '```'
            ls -1 dist/tree_sitter_language_pack-*.gem 2>/dev/null || echo "(no gems)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Re-check RubyGems before publish
        if: ${{ !inputs.dry_run }}
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: rubygems
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

      - name: Configure trusted publishing credentials
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Publish gems to RubyGems
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-rubygems@v1
        with:
          gems-dir: dist
          dry-run: ${{ inputs.dry_run }}

  # ─── Publish Maven package ────────────────────────────────────────
  publish-maven:
    name: Publish Maven package
    needs: [prepare, validate-versions, check-registries, build-java-package]
    if: |
      always() &&
      needs.prepare.outputs.release_java == 'true' &&
      needs.build-java-package.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).maven != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Re-check Maven Central before publish
        id: recheck
        if: ${{ !inputs.dry_run }}
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: maven
          package: dev.kreuzberg:tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}

      - name: Setup Java
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Setup Maven
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/setup-maven@v1

      # publish-maven runs `mvn clean deploy` which wipes target/ AND rebuilds
      # the JAR from src/. The JAR with natives that build-java-package
      # produced gets discarded; we must re-download the per-platform native
      # artifacts and re-stage them under src/main/resources/natives/ so the
      # rebuild's resources phase picks them up. Without this, the JAR
      # uploaded to Maven Central contains only .class files (no .so/.dll/.dylib).
      - name: Download Java native artifacts (re-stage for deploy rebuild)
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: java-natives-*
          path: artifacts/java-natives
          merge-multiple: false

      - name: Re-stage Java native resources
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        shell: bash
        run: |
          ARTIFACTS_DIR="artifacts/java-natives"
          RESOURCES_DIR="packages/java/src/main/resources/natives"
          REQUIRED_CLASSIFIERS="linux-x86_64 linux-arm64 macos-arm64 macos-x86_64 windows-x86_64 windows-arm64"
          mkdir -p "$RESOURCES_DIR"
          # build-java-natives@v1 stages each lib at
          # `{output-dir}/native/{classifier}/{libfile}` and uploads that tree as
          # artifact `java-natives-{label}`. download-artifact with
          # `merge-multiple: false` preserves the artifact-name wrapper, so the
          # final layout is:
          #   $ARTIFACTS_DIR/java-natives-{label}/native/{classifier}/{libfile}
          # The classifier is the lib's immediate parent — one `dirname` up.
          find "$ARTIFACTS_DIR" \( -name '*.so' -o -name '*.dll' -o -name '*.dylib' \) -print0 |
          while IFS= read -r -d '' f; do
            platform=$(basename "$(dirname "$f")")
            mkdir -p "$RESOURCES_DIR/$platform"
            cp "$f" "$RESOURCES_DIR/$platform/"
          done
          echo "=== Staged native resources for deploy ==="
          find "$RESOURCES_DIR" -type f | sort
          # Fail loudly if any required classifier directory is empty — this
          # caught us on 1.8.1 where natives collapsed under `natives/native/`
          # because the previous loop used `dirname "$(dirname …)"`.
          missing=()
          for c in $REQUIRED_CLASSIFIERS; do
            if ! ls "$RESOURCES_DIR/$c"/*ts_pack_core_ffi* >/dev/null 2>&1; then
              missing+=("$c")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::missing classifier dirs: ${missing[*]}"
            exit 1
          fi

      - name: Publish to Maven Central
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-maven@v1
        with:
          pom-file: packages/java/pom.xml
          maven-profile: publish
          extra-args: -DskipTests
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run requested; Maven publish skipped." >> "$GITHUB_STEP_SUMMARY"

  # ─── Publish Elixir to Hex.pm ──────────────────────────────────────
  publish-hex:
    name: Publish Elixir to Hex.pm
    needs: [prepare, validate-versions, check-registries, publish-crates, upload-elixir-release]
    if: |
      always() &&
      needs.prepare.outputs.release_elixir == 'true' &&
      needs.upload-elixir-release.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).hex != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: hex
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Setup Elixir
        uses: erlef/setup-elixir@v1.24
        with:
          elixir-version: "1.17"
          otp-version: "27.2"
          version-type: strict

      - name: Install Hex and Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Generate checksums from GitHub release
        # tslp uploads BOTH underscore and hyphen variants of NIF artifacts
        # (libtree_sitter_language_pack_nif-* and libtree-sitter-language-pack-nif-*)
        # because RustlerPrecompiled name normalization differs by runtime;
        # the shared generate-elixir-checksums@v1 action only emits one form,
        # so this stays as a tslp-specific script.
        run: ./scripts/publish/elixir/generate_checksums.sh "${{ needs.prepare.outputs.version }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install Elixir dependencies
        working-directory: packages/elixir
        run: mix deps.get

      - name: Verify checksum file exists before compile
        run: |
          CHECKSUM_FILE="packages/elixir/checksum-Elixir.TreeSitterLanguagePack.Native.exs"
          if [[ ! -f "$CHECKSUM_FILE" ]]; then
            echo "ERROR: Checksum file not found: $CHECKSUM_FILE"
            echo "The generate_checksums.sh step must have failed silently."
            exit 1
          fi
          echo "Checksum file present: $CHECKSUM_FILE"
          echo "Contents:"
          cat "$CHECKSUM_FILE"

      - name: Patch Rustler --cfg flag placement
        working-directory: packages/elixir
        run: |
          sed -i 's/args ++ \["--cfg", "build_#{System.system_time(:millisecond)}"\]/args ++ ["--", "--cfg", "build_#{System.system_time(:millisecond)}"]/' deps/rustler/lib/rustler/compiler.ex

      - name: Compile project (precompiled mode — checksums already generated)
        working-directory: packages/elixir
        run: mix compile

      - name: Re-check Hex.pm before publish
        id: recheck
        uses: kreuzberg-dev/actions/check-registry@v1
        with:
          registry: hex
          package: tree_sitter_language_pack
          version: ${{ needs.prepare.outputs.version }}

      # On dry-run, exercise the actual Hex tarball build via the shared
      # build-elixir-hex@v1 action (generates Cargo.lock via cargo
      # generate-lockfile to satisfy mix.exs files list when the core crate
      # is not yet on crates.io).
      - name: Validate Hex tarball build (dry-run)
        if: ${{ inputs.dry_run }}
        uses: kreuzberg-dev/actions/build-elixir-hex@v1
        with:
          package-dir: packages/elixir
          nif-crate-path: packages/elixir/native/tree_sitter_language_pack_nif
          dry-run: "true"
          rewrite-native-deps: "false"

      - name: Publish to Hex.pm
        if: ${{ !inputs.dry_run && steps.recheck.outputs.exists != 'true' }}
        uses: kreuzberg-dev/actions/publish-hex@v1
        with:
          package-dir: packages/elixir
          skip-docs: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run requested; Hex.pm publish skipped (tarball build validated above)." >> "$GITHUB_STEP_SUMMARY"

  # ─── Upload PHP PIE artifacts to GitHub Release ──────────────────
  # Runs unconditionally on every release_php=true publish, even if Packagist
  # already has the version. Without this, end users have no way to install
  # the precompiled PHP extension binaries (PIE artifacts have 14-day workflow
  # retention only).
  upload-php-pie-release:
    name: Upload PHP PIE binaries to GitHub Release
    needs: [prepare, validate-versions, build-php-extension]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.release_php == 'true' &&
      needs.build-php-extension.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download PHP package artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: php-package-*
          path: dist/php-package
          merge-multiple: true

      - name: Upload PHP PIE packages
        uses: kreuzberg-dev/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/php-package
          fail-if-empty: "false"
          assets: |
            php_*.tgz
            php_*.tgz.sha256
            php_*.zip
            php_*.zip.sha256

  # ─── Publish PHP to Packagist ────────────────────────────────────
  publish-packagist:
    name: Publish PHP to Packagist
    needs: [prepare, validate-versions, check-registries, build-php-extension]
    if: |
      always() &&
      needs.prepare.outputs.release_php == 'true' &&
      needs.build-php-extension.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).packagist != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: echo "Dry run requested; Packagist publish skipped." >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to Packagist
        if: ${{ !inputs.dry_run }}
        uses: kreuzberg-dev/actions/publish-packagist@v1
        with:
          packagist-username: Goldziher
          package-name: kreuzberg/tree-sitter-language-pack
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/kreuzberg-dev/tree-sitter-language-pack
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

  # ─── Publish C# to NuGet ─────────────────────────────────────────
  publish-nuget:
    name: Publish C# to NuGet
    needs: [prepare, validate-versions, check-registries, build-csharp-package]
    if: |
      always() &&
      needs.prepare.outputs.release_csharp == 'true' &&
      needs.build-csharp-package.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).nuget != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: "10.0"

      - name: Download NuGet package
        uses: actions/download-artifact@v8.0.1
        with:
          name: nuget-packages
          path: dist/nuget

      - name: Dry run summary
        if: ${{ inputs.dry_run }}
        run: |
          {
            echo "## NuGet Dry Run"
            echo "NuGet packages staged:"
            echo '```'
            ls -1 dist/nuget/*.nupkg 2>/dev/null || echo "(no packages)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish to NuGet
        if: ${{ !inputs.dry_run }}
        uses: kreuzberg-dev/actions/publish-nuget@v1
        with:
          packages-dir: dist/nuget
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  # ─── Dart (pub.dev) ───────────────────────────────────────────────
  build-dart-package:
    name: Build Dart package
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && (fromJson(needs.check-registries.outputs.results).pub != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/build-dart-package@v1
        with:
          package-dir: packages/dart/rust
          crate-name: tree-sitter-language-pack-dart
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: dart-package
          path: packages/dart
          retention-days: 14

  # ─── Swift (Swift Package Index via tag) ──────────────────────────
  build-swift-artifactbundle:
    name: Build Swift artifact bundle
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_swift == 'true' && (fromJson(needs.check-registries.outputs.results).spi-swift != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/build-swift-artifactbundle@v1
        id: bundle
        with:
          crate-name: tree-sitter-language-pack-swift
          artifact-name: TreeSitterLanguagePackSwift
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: swift-artifactbundle
          path: ${{ steps.bundle.outputs.bundle-zip }}
          if-no-files-found: error
          retention-days: 14

  build-swift-package:
    name: Build Swift package
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_swift == 'true' && (fromJson(needs.check-registries.outputs.results).spi-swift != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/build-swift-package@v1
        with:
          package-dir: packages/swift
          crate-name: tree-sitter-language-pack-swift
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: swift-package
          path: packages/swift
          retention-days: 14

  publish-swift:
    name: Notify Swift Package Index
    needs: [prepare, check-registries, build-swift-package, build-swift-artifactbundle]
    if: ${{ needs.prepare.outputs.release_swift == 'true' && needs.prepare.outputs.dry_run != 'true' && (fromJson(needs.check-registries.outputs.results).spi-swift != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/publish-swift@v1
        with:
          working-directory: packages/swift
          tag: ${{ needs.prepare.outputs.tag }}
          ping-spi: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  # ─── Zig (GitHub Release tarball) ─────────────────────────────────
  build-zig-package:
    name: Build Zig package (smoke check)
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_zig == 'true' && (fromJson(needs.check-registries.outputs.results).zig != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - uses: kreuzberg-dev/actions/build-zig-package@v1
        with:
          ffi-crate: ts-pack-core-ffi
          package-dir: packages/zig

  publish-zig:
    name: Publish Zig package metadata to GitHub Release
    needs: [prepare, check-registries, build-zig-package]
    if: ${{ needs.prepare.outputs.release_zig == 'true' && needs.prepare.outputs.dry_run != 'true' && (fromJson(needs.check-registries.outputs.results).zig != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: kreuzberg-dev/actions/publish-zig@v1
        with:
          working-directory: packages/zig
          tag: ${{ needs.prepare.outputs.tag }}
          update-release-notes: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Kotlin-Android (Maven Central via Gradle) ────────────────────
  build-kotlin-android-natives:
    name: Build kotlin-android natives (${{ matrix.abi }})
    needs: [prepare, check-registries]
    if: ${{ needs.prepare.outputs.release_kotlin_android == 'true' && (fromJson(needs.check-registries.outputs.results).maven-kotlin-android != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - abi: arm64-v8a
            target: aarch64-linux-android
          - abi: x86_64
            target: x86_64-linux-android
          - abi: armeabi-v7a
            target: armv7-linux-androideabi
          - abi: x86
            target: i686-linux-android
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          submodules: recursive
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: kotlin-android-${{ matrix.abi }}
      - uses: kreuzberg-dev/actions/setup-android-ndk@v1
      - uses: kreuzberg-dev/actions/build-android-natives@v1
        with:
          crate-name: tree-sitter-language-pack-jni
          lib-name: ts_pack_jni
          abis: ${{ matrix.abi }}
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: kotlin-android-${{ matrix.abi }}
          path: dist/android-natives/${{ matrix.abi }}/
          if-no-files-found: error

  publish-kotlin-android:
    name: Publish kotlin-android (Maven Central via Gradle)
    needs: [prepare, check-registries, build-kotlin-android-natives]
    if: ${{ needs.prepare.outputs.release_kotlin_android == 'true' && needs.prepare.outputs.dry_run != 'true' && (fromJson(needs.check-registries.outputs.results).maven-kotlin-android != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: actions/download-artifact@v8.0.1
        with:
          pattern: kotlin-android-*
          path: kotlin-android-natives
          merge-multiple: false
      - name: Stage natives into AAR jniLibs
        shell: bash
        run: |
          for abi in arm64-v8a x86_64 armeabi-v7a x86; do
            src="kotlin-android-natives/kotlin-android-${abi}"
            [ -d "$src" ] || continue
            mkdir -p "packages/kotlin-android/src/main/jniLibs/${abi}"
            cp -v "${src}/libts_pack_jni.so" \
                  "packages/kotlin-android/src/main/jniLibs/${abi}/"
          done
      - uses: kreuzberg-dev/actions/publish-maven-gradle@v1
        with:
          working-directory: packages/kotlin-android
          gradle-task: publishAndReleaseToMavenCentral
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ─── Build CLI binaries ───────────────────────────────────────────
  build-cli:
    name: Build CLI (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_homebrew == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            artifact: ts-pack-linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            artifact: ts-pack-linux-aarch64
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            artifact: ts-pack-macos-arm64
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
            artifact: ts-pack-macos-x86_64
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            artifact: ts-pack-windows-x86_64
          - os: windows-11-arm
            label: windows-aarch64
            target: aarch64-pc-windows-msvc
            artifact: ts-pack-windows-aarch64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Get all language names
        id: langs
        shell: bash
        run: |
          LANGS=$(python3 -c "import json; d=json.load(open('sources/language_definitions.json')); print(','.join(sorted(d.keys())))")
          echo "names=$LANGS" >> "$GITHUB_OUTPUT"

      - name: Build CLI
        run: cargo build --release -p ts-pack-cli --target ${{ matrix.target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          TSLP_LANGUAGES: ${{ steps.langs.outputs.names }}
          TSLP_LINK_MODE: static

      - name: Package CLI (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ts-pack staging/
          cd staging && tar -czf "../${{ matrix.artifact }}.tar.gz" ts-pack

      - name: Package CLI (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/release/ts-pack.exe staging/
          cd staging && 7z a "../${{ matrix.artifact }}.zip" ts-pack.exe

      - name: Upload CLI binary
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          retention-days: 14

  # ─── Upload CLI binaries to GitHub Release ──────────────────────────
  upload-cli-release:
    name: Upload CLI binaries to GitHub Release
    needs: [prepare, build-cli]
    if: |
      needs.prepare.outputs.dry_run != 'true' &&
      needs.build-cli.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download CLI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: ts-pack-*
          path: dist/cli
          merge-multiple: true

      - name: Upload to GitHub Release
        uses: kreuzberg-dev/actions/publish-github-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          title: "Release ${{ needs.prepare.outputs.tag }}"
          artifacts: |
            dist/cli/ts-pack-*.tar.gz
            dist/cli/ts-pack-*.zip
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ github.token }}

  # ─── Update Homebrew formula source URLs + SHAs ────────────────────
  publish-homebrew-formula:
    name: Update Homebrew formula
    needs: [prepare, check-registries, upload-c-ffi-release]
    if: |
      always() &&
      needs.prepare.outputs.release_homebrew == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.upload-c-ffi-release.result == 'success' &&
      (fromJson(needs.check-registries.outputs.results).homebrew != 'true' || needs.prepare.outputs.force_republish == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6.0.2
        with:
          repository: kreuzberg-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Update formula files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAP_DIR: ${{ github.workspace }}/homebrew-tap
        run: scripts/publish/update-homebrew-formula.sh

      - name: Commit and push to tap
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config user.name "tree-sitter-language-pack-bot"
          git config user.email "bot@kreuzberg.dev"
          if git diff --quiet Formula/; then
            echo "No formula changes; skipping commit."
            exit 0
          fi
          git add Formula/ts-pack.rb Formula/libts-pack.rb
          git commit -m "tree-sitter-language-pack ${{ needs.prepare.outputs.version }}"
          git push origin HEAD

  # ─── Build real Homebrew bottles per platform ──────────────────────
  homebrew-bottles:
    name: Build Homebrew bottle (${{ matrix.bottle_tag }})
    needs: [prepare, publish-homebrew-formula]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.publish-homebrew-formula.result == 'success'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            bottle_tag: arm64_sequoia
            install_brew: false
          - os: macos-15-intel
            bottle_tag: sequoia
            install_brew: false
          - os: ubuntu-latest
            bottle_tag: x86_64_linux
            install_brew: true
          - os: ubuntu-24.04-arm
            bottle_tag: arm64_linux
            install_brew: true
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Install Homebrew (Linux)
        if: ${{ matrix.install_brew }}
        uses: kreuzberg-dev/actions/install-homebrew-linux@v1

      - name: Build bottles
        uses: kreuzberg-dev/actions/homebrew-build-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          tap: kreuzberg-dev/tap
          formulas: |
            ts-pack
            libts-pack
          out-dir: ${{ github.workspace }}/bottle-json
          github-repo: kreuzberg-dev/tree-sitter-language-pack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload bottle JSON manifests
        uses: actions/upload-artifact@v7.0.1
        with:
          name: homebrew-bottle-json-${{ matrix.bottle_tag }}
          path: ${{ github.workspace }}/bottle-json/*.json
          if-no-files-found: error

  # ─── Merge bottle DSL into formulas in the tap ─────────────────────
  publish-homebrew-bottles:
    name: Merge Homebrew bottle DSL
    needs: [prepare, publish-homebrew-formula, homebrew-bottles]
    if: |
      always() &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.publish-homebrew-formula.result == 'success' &&
      needs.homebrew-bottles.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6.0.2
        with:
          repository: kreuzberg-dev/homebrew-tap
          token: ${{ secrets.HOMEBREW_TOKEN }}
          path: homebrew-tap

      - name: Download all bottle JSON manifests
        uses: actions/download-artifact@v8.0.1
        with:
          path: ${{ github.workspace }}/bottle-json
          pattern: homebrew-bottle-json-*
          merge-multiple: true

      - name: Merge bottle DSL into formulas
        uses: kreuzberg-dev/actions/homebrew-merge-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          tap-dir: ${{ github.workspace }}/homebrew-tap
          json-dir: ${{ github.workspace }}/bottle-json
          formulas: |
            ts-pack
            libts-pack
          github-repo: kreuzberg-dev/tree-sitter-language-pack

      - name: Commit and push bottle DSL
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
        run: |
          git config user.name "tree-sitter-language-pack-bot"
          git config user.email "bot@kreuzberg.dev"
          if git diff --quiet Formula/; then
            echo "No bottle DSL changes; skipping commit."
            exit 0
          fi
          git add Formula/ts-pack.rb Formula/libts-pack.rb
          git commit -m "tree-sitter-language-pack ${{ needs.prepare.outputs.version }}: add bottle DSL"
          git push origin HEAD

  # ─── Release finalize ──────────────────────────────────────────────
  release-finalize:
    name: Finalize release
    needs:
      - prepare
      - validate-versions
      - check-registries
      - upload-parser-binaries
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
      - publish-crates
      - publish-pypi
      - publish-node
      - publish-wasm
      - publish-rubygems
      - publish-maven
      - publish-hex
      - publish-packagist
      - publish-nuget
      - publish-homebrew-formula
      - homebrew-bottles
      - upload-cli-release
      - publish-homebrew-bottles
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Finalize release (publish from draft, tag Go module)
        uses: kreuzberg-dev/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          go-module-path: ${{ needs.prepare.outputs.release_go == 'true' && 'packages/go' || '' }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - name: Aggregate release status
        if: always()
        env:
          CHECK_RESULTS: ${{ needs.check-registries.outputs.results }}
          RESULT_VALIDATE: ${{ needs.validate-versions.result }}
          RESULT_PUBLISH_CRATES: ${{ needs.publish-crates.result }}
          RESULT_PUBLISH_PYPI: ${{ needs.publish-pypi.result }}
          RESULT_PUBLISH_NODE: ${{ needs.publish-node.result }}
          RESULT_PUBLISH_WASM: ${{ needs.publish-wasm.result }}
          RESULT_PUBLISH_RUBYGEMS: ${{ needs.publish-rubygems.result }}
          RESULT_PUBLISH_MAVEN: ${{ needs.publish-maven.result }}
          RESULT_PUBLISH_HEX: ${{ needs.publish-hex.result }}
          RESULT_PUBLISH_PACKAGIST: ${{ needs.publish-packagist.result }}
          RESULT_PUBLISH_NUGET: ${{ needs.publish-nuget.result }}
          RESULT_UPLOAD_PARSERS: ${{ needs.upload-parser-binaries.result }}
          RESULT_UPLOAD_GO: ${{ needs.upload-go-release.result }}
          RESULT_UPLOAD_C_FFI: ${{ needs.upload-c-ffi-release.result }}
          RESULT_UPLOAD_ELIXIR: ${{ needs.upload-elixir-release.result }}
          RESULT_UPLOAD_HOMEBREW: ${{ needs.homebrew-bottles.result }}
          RESULT_PUBLISH_HOMEBREW: ${{ needs.publish-homebrew-bottles.result }}
        run: |
          {
            echo "## Release Summary"
            echo ""
            echo "| Target | Status |"
            echo "|--------|--------|"

            if [[ "$RESULT_VALIDATE" != "success" ]]; then
              echo "| version-check | **FAILED** |"
            else
              echo "| version-check | passed |"
            fi

            declare -A results
            results[crates]="${RESULT_PUBLISH_CRATES}"
            results[python]="${RESULT_PUBLISH_PYPI}"
            results[node]="${RESULT_PUBLISH_NODE}"
            results[wasm]="${RESULT_PUBLISH_WASM}"
            results[ruby]="${RESULT_PUBLISH_RUBYGEMS}"
            results[maven]="${RESULT_PUBLISH_MAVEN}"
            results[hex]="${RESULT_PUBLISH_HEX}"
            results[parser-binaries]="${RESULT_UPLOAD_PARSERS}"
            results[go-ffi]="${RESULT_UPLOAD_GO}"
            results[c-ffi]="${RESULT_UPLOAD_C_FFI}"
            results[elixir-nifs]="${RESULT_UPLOAD_ELIXIR}"
            results[packagist]="${RESULT_PUBLISH_PACKAGIST}"
            results[nuget]="${RESULT_PUBLISH_NUGET}"
            results[homebrew]="${RESULT_PUBLISH_HOMEBREW}"

            declare -A checks
            checks[crates]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.cratesio // ""')"
            checks[python]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.pypi // ""')"
            checks[node]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.npm // ""')"
            checks[wasm]="$(printf '%s' "$CHECK_RESULTS" | jq -r '."npm-wasm" // ""')"
            checks[ruby]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.rubygems // ""')"
            checks[maven]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.maven // ""')"
            checks[hex]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.hex // ""')"
            checks[packagist]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.packagist // ""')"
            checks[nuget]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.nuget // ""')"
            checks[homebrew]="$(printf '%s' "$CHECK_RESULTS" | jq -r '.homebrew // ""')"

            for target in crates python node wasm ruby maven hex packagist nuget homebrew parser-binaries go-ffi c-ffi elixir-nifs; do
              result="${results[$target]}"
              check="${checks[$target]:-}"
              if [[ "$result" == "success" ]]; then
                echo "| $target | published |"
              elif [[ "$check" == "true" ]]; then
                echo "| $target | already exists (skipped) |"
              elif [[ "$result" == "skipped" ]]; then
                echo "| $target | skipped (not enabled) |"
              elif [[ "$result" == "failure" ]]; then
                echo "| $target | **FAILED** |"
              else
                echo "| $target | $result |"
              fi
            done

            echo ""
            echo "- **Tag**: ${{ needs.prepare.outputs.tag }}"
            echo "- **Version**: ${{ needs.prepare.outputs.version }}"
            echo "- **Dry run**: ${{ inputs.dry_run }}"
            echo "- **Force republish**: ${{ inputs.force_republish }}"
          } >> "$GITHUB_STEP_SUMMARY"

  announce-discord:
    name: Announce release on Discord
    needs:
      - prepare
      - publish-crates
      - publish-pypi
      - publish-node
      - publish-wasm
      - publish-rubygems
      - publish-maven
      - publish-hex
      - publish-packagist
      - publish-nuget
      - publish-homebrew-formula
      - publish-homebrew-bottles
      - upload-parser-binaries
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
      - upload-cli-release
      - release-finalize
    if: |
      always() &&
      !cancelled() &&
      needs.prepare.outputs.dry_run != 'true' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: kreuzberg-dev/actions/announce-release-discord@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          project-name: tree-sitter-language-pack
