  # ─── Build Java native libraries ───────────────────────────────────
  build-java-natives:
    name: Build Java natives (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
            platform: linux-x86_64
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
            platform: macos-arm64
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
            platform: macos-x86_64
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
            platform: windows-x86_64
          - os: windows-11-arm
            label: windows-arm64
            target: aarch64-pc-windows-msvc
            platform: windows-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Build Java native library
        uses: kreuzberg-dev/actions/build-java-natives@v1
        with:
          target: ${{ matrix.target }}
          crate-name: ts-pack-core-ffi
          lib-name: ts_pack_core_ffi
          classifier: ${{ matrix.platform }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          output-dir: dist/java-ffi

      - name: Upload native artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: java-natives-${{ matrix.label }}
          path: dist/java-ffi
          retention-days: 14

  # ─── Build Java package ────────────────────────────────────────────
  build-java-package:
    name: Build Java package
    needs: [prepare, validate-versions, build-java-natives]
    if: needs.prepare.outputs.release_java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Setup Java
        uses: actions/setup-java@v5.2.0
        with:
          distribution: "temurin"
          java-version: "25"
          cache: "maven"

      - name: Setup Maven
        uses: kreuzberg-dev/actions/setup-maven@v1

      - name: Download Java native artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: java-natives-*
          path: artifacts/java-natives
          merge-multiple: true

      - name: Stage Java native resources
        uses: kreuzberg-dev/actions/stage-java-natives@v1
        with:
          artifacts-dir: artifacts/java-natives
          resources-dir: packages/java/src/main/resources/natives
          required-classifiers: linux-x86_64 linux-arm64 macos-arm64 macos-x86_64 windows-x86_64 windows-arm64
          lib-name: ts_pack_core_ffi

      - name: Build and package
        working-directory: packages/java
        run: mvn clean package -DskipTests

      - name: Verify JAR contains native libs
        working-directory: packages/java
        shell: bash
        run: |
          JAR=""
          for f in target/tree-sitter-language-pack-*.jar; do
            case "$f" in *-sources.jar|*-javadoc.jar) continue ;; esac
            JAR="$f"
            break
          done
          if [ -z "$JAR" ]; then
            echo "::error::No JAR found in target/"
            exit 1
          fi
          echo "Checking JAR: $JAR"
          ENTRIES=$(jar tf "$JAR" | grep -E '^natives/[^/]+/(lib)?ts_pack_core_ffi\.(so|dll|dylib)$' || true)
          echo "Native lib entries:"
          echo "$ENTRIES"
          # Issue #128: a previous bug staged every lib under `natives/native/`
          # because the re-stage loop walked one dirname too far. Require each
          # expected classifier directory to be present individually so the
          # collapse-to-`native` regression cannot ship again.
          REQUIRED_CLASSIFIERS="linux-x86_64 linux-arm64 macos-arm64 macos-x86_64 windows-x86_64 windows-arm64"
          missing=()
          for c in $REQUIRED_CLASSIFIERS; do
            if ! echo "$ENTRIES" | grep -qE "^natives/$c/(lib)?ts_pack_core_ffi\.(so|dll|dylib)$"; then
              missing+=("$c")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            echo "::error::JAR missing natives for classifiers: ${missing[*]}"
            jar tf "$JAR" | grep -E '^natives/' || echo "(no natives/ entries at all)"
            exit 1
          fi

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: maven-packages
          path: packages/java/target/*.jar
          retention-days: 14

  # ─── Build Elixir NIFs ────────────────────────────────────────────
  build-elixir-nifs:
    name: Build Elixir NIF (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

      - name: Download parsers
        uses: actions/download-artifact@v8.0.1
        with:
          name: language-parsers
          path: parsers

      - name: Setup Rust
        uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          components: ""
          use-sccache: "false"
          install-llvm-cov: "false"

      - name: Rewrite native dependencies
        uses: kreuzberg-dev/actions/rewrite-native-deps@v1
        with:
          lang: elixir

      - name: Build Elixir NIF
        working-directory: packages/elixir/native/tree_sitter_language_pack_nif
        run: cargo build --release --target ${{ matrix.target }}
        env:
          PROJECT_ROOT: ${{ github.workspace }}
          CARGO_BUILD_TARGET: ${{ matrix.target }}

      - name: Package NIF libraries (NIF 2.16)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.16"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.so"
          fi

          mkdir -p dist/elixir
          # Underscore name (matches Cargo output)
          ARTIFACT_UNDERSCORE="libtree_sitter_language_pack_nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          # Hyphen name (matches what RustlerPrecompiled expects from crate: "ts-pack-elixir")
          ARTIFACT_HYPHEN="libtree-sitter-language-pack-nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"

          # ts-pack-elixir is a standalone workspace, output is in packages/elixir/target/
          LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            find . -name "${LIB_NAME}" -type f 2>/dev/null || true
            exit 1
          fi

          # Create both underscore and hyphen tarballs
          cp "$LIB_PATH" "${ARTIFACT_UNDERSCORE}"
          tar -czf "dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz" "${ARTIFACT_UNDERSCORE}"
          echo "Created: dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz"

          cp "$LIB_PATH" "${ARTIFACT_HYPHEN}"
          tar -czf "dist/elixir/${ARTIFACT_HYPHEN}.tar.gz" "${ARTIFACT_HYPHEN}"
          echo "Created: dist/elixir/${ARTIFACT_HYPHEN}.tar.gz"

      - name: Package NIF libraries (NIF 2.17)
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          TARGET="${{ matrix.target }}"
          NIF_VERSION="2.17"

          if [[ "${{ runner.os }}" == "macOS" ]]; then
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.dylib"
          else
            ARCHIVE_EXT="so"
            LIB_NAME="libtree_sitter_language_pack_nif.so"
          fi

          ARTIFACT_UNDERSCORE="libtree_sitter_language_pack_nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"
          ARTIFACT_HYPHEN="libtree-sitter-language-pack-nif-v${VERSION}-nif-${NIF_VERSION}-${TARGET}.${ARCHIVE_EXT}"

          # ts-pack-elixir is a standalone workspace, output is in packages/elixir/target/
          LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/${TARGET}/release/${LIB_NAME}"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="packages/elixir/native/tree_sitter_language_pack_nif/target/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/${TARGET}/release/${LIB_NAME}"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="target/release/${LIB_NAME}"
          fi

          if [[ ! -f "$LIB_PATH" ]]; then
            echo "ERROR: Library not found"
            find . -name "${LIB_NAME}" -type f 2>/dev/null || true
            exit 1
          fi

          cp "$LIB_PATH" "${ARTIFACT_UNDERSCORE}"
          tar -czf "dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz" "${ARTIFACT_UNDERSCORE}"
          echo "Created: dist/elixir/${ARTIFACT_UNDERSCORE}.tar.gz"

          cp "$LIB_PATH" "${ARTIFACT_HYPHEN}"
          tar -czf "dist/elixir/${ARTIFACT_HYPHEN}.tar.gz" "${ARTIFACT_HYPHEN}"
          echo "Created: dist/elixir/${ARTIFACT_HYPHEN}.tar.gz"

      - name: Upload NIF artifacts
        uses: actions/upload-artifact@v7.0.1
        with:
          name: elixir-${{ matrix.label }}
          path: dist/elixir/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  # ─── Build C FFI libraries ────────────────────────────────────────
  build-c-ffi:
    name: Build C FFI (${{ matrix.label }})
    needs: [prepare, validate-versions, clone-vendors]
    if: needs.prepare.outputs.release_c_ffi == 'true'
    runs-on: ${{ matrix.os }}
