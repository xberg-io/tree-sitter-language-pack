[workspace]
alef_version = "0.19.0"
languages = [
  "python",
  "node",
  "ruby",
  "php",
  "ffi",
  "go",
  "java",
  "csharp",
  "elixir",
  "wasm",
  "dart",
  "kotlin_android",
  "swift",
  "zig",
  "jni",
]

[workspace.opaque_types]
Language = "tree_sitter_language_pack::Language"

[workspace.dto]
# Languages without an entry below use alef's `DtoConfig` schema default.
# alef's `DtoConfig` (alef-core/src/config/dto.rs) covers python/node/ruby/php/elixir/go/java/csharp/r.
# wasm, dart, swift, zig, kotlin_android, ffi have no DTO config concept — they
# emit native types via their backend (TS interface, frb class, swift struct,
# zig comptime struct, kotlin data class, C struct).
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"

[workspace.sync]
extra_paths = [
  "crates/ts-pack-core-node/package.json",
  "crates/ts-pack-core-node/npm/*/package.json",
  "packages/ruby/ext/ts_pack_core_rb/native/Cargo.toml",
  "pyproject.toml",
]

[workspace.citation]
title = "tree-sitter-language-pack"
abstract = "Tree-sitter grammars and code-intelligence primitives."
repository-code = "https://github.com/kreuzberg-dev/tree-sitter-language-pack"
url = "https://kreuzberg.dev"
license = "MIT"
date-released = "2026-05-17"

[[workspace.citation.authors]]
family-names = "Hirschfeld"
given-names = "Na'aman"
email = "naaman@kreuzberg.dev"
orcid = "https://orcid.org/0009-0000-2247-5072"

[[workspace.sync.text_replacements]]
path = "test_apps/node/package.json"
search = '"@kreuzberg/tree-sitter-language-pack": "[^"]*"'
replace = '"@kreuzberg/tree-sitter-language-pack": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/wasm/package.json"
search = '"@kreuzberg/tree-sitter-language-pack-wasm": "[^"]*"'
replace = '"@kreuzberg/tree-sitter-language-pack-wasm": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/java/pom.xml"
search = '(<artifactId>tree-sitter-language-pack</artifactId>\s+<version>)[^<]+'
replace = '${1}{version}'

[[workspace.sync.text_replacements]]
path = "test_apps/csharp/TreeSitterLanguagePack.E2eTests.csproj"
search = 'Include="TreeSitterLanguagePack" Version="[^"]*"'
replace = 'Include="TreeSitterLanguagePack" Version="{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/php/composer.json"
search = '"kreuzberg-dev/tree-sitter-language-pack": "[^"]*"'
replace = '"kreuzberg-dev/tree-sitter-language-pack": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/go/go.mod"
search = 'kreuzberg-dev/tree-sitter-language-pack/packages/go v[^\s]*'
replace = 'kreuzberg-dev/tree-sitter-language-pack/packages/go v{version}'

[[workspace.sync.text_replacements]]
path = "test_apps/rust/Cargo.toml"
search = '(package = "tree-sitter-language-pack", version = ")[^"]*'
replace = '${1}{version}'

[[workspace.sync.text_replacements]]
path = "test_apps/ruby/Gemfile"
search = "gem 'tree_sitter_language_pack', '[^']*'"
replace = "gem 'tree_sitter_language_pack', '{version}'"

[[workspace.sync.text_replacements]]
path = "packages/elixir/native/tree_sitter_language_pack_nif/Cargo.toml"
search = '^version = "[^"]*"'
replace = 'version = "{version}"'

[[crates]]
name = "tree-sitter-language-pack"
core_import = "tree_sitter_language_pack"
sources = ["crates/ts-pack-core/src/lib.rs"]
version_from = "Cargo.toml"
features = ["serde", "config", "download"]

[[crates.source_crates]]
name = "tree-sitter-language-pack"
sources = ["crates/ts-pack-core/src/lib.rs"]
workspace_root = "."
features = ["serde", "config", "download"]

[crates.python]
module_name = "_native"
pip_name = "tree-sitter-language-pack"
pip_dependencies = ["tree-sitter>=0.23"]
release_gil = true

[crates.python.stubs]
output = "packages/python/tree_sitter_language_pack/"

[crates.python.capsule_types]
Language = "tree_sitter.Language"

[crates.python.extra_init_imports]
"._supported_languages" = ["SupportedLanguage"]

[crates.node]
package_name = "@kreuzberg/tree-sitter-language-pack"
crate_dir = "crates/ts-pack-core-node"

[crates.node.capsule_types.Language]
type = "Language"
from_module = "tree-sitter"
property_name = "language"
type_tag = { lower = "0x8AF2E5212AD58ABF", upper = "0xD5006CAD83ABBA16" }

[crates.ruby]
gem_name = "tree_sitter_language_pack"

[crates.ruby.stubs]
output = "packages/ruby/sig"

[crates.php]
extension_name = "tree_sitter_language_pack"
cargo_crate_name = "ts-pack-core-php"

[crates.elixir]
app_name = "tree_sitter_language_pack"

[crates.wasm]
crate_dir = "crates/ts-pack-core-wasm"
# C-stdlib symbols imported by tree-sitter external scanners under wasm32.
# `wasm-objdump -j Import` on the bundle shows these 10 are pulled in by the
# curated grammar set; alef emits Rust shims for each.
env_shims = [
  "iswspace",
  "iswalnum",
  "iswalpha",
  "iswlower",
  "iswupper",
  "iswxdigit",
  "towupper",
  "towlower",
  "memchr",
  "strcmp",
]
features = ["serde", "config", "dynamic-loading"]
# Curated grammar subset that's statically compiled into the wasm32 binary.
# Mirrors the TSLP_LANGUAGES list used by the publish-wasm CI job so that
# alef's `[crates.e2e.wasm]` auto-skip path correctly elides fixtures for
# grammars that aren't present in the wasm bundle.
languages = [
  "python",
  "javascript",
  "typescript",
  "tsx",
  "rust",
  "go",
  "java",
  "c",
  "cpp",
  "csharp",
  "ruby",
  "php",
  "html",
  "css",
  "json",
  "yaml",
  "toml",
  "markdown",
  "bash",
  "sql",
  "lua",
  "scala",
  "kotlin",
  "swift",
  "dockerfile",
  "vue",
  "svelte",
  "elixir",
  "erlang",
  "haskell",
  "zig",
]

[crates.ffi]
prefix = "ts_pack"
header_name = "ts_pack.h"
lib_name = "ts_pack_core_ffi"

[crates.go]
module = "github.com/kreuzberg-dev/tree-sitter-language-pack/packages/go"
package_name = "tspack"

[crates.java]
package = "dev.kreuzberg.treesitterlanguagepack"

[crates.csharp]
namespace = "TreeSitterLanguagePack"
project_file = "packages/csharp/TreeSitterLanguagePack/TreeSitterLanguagePack.csproj"

[crates.dart]
pubspec_name = "tree_sitter_language_pack"
lib_name = "tree_sitter_language_pack"
style = "frb"

[crates.kotlin_android]
# Android-only AAR. JVM Kotlin users consume the canonical Java/Panama-FFM
# package directly (Kotlin/Java interop is total). Panama FFM is unavailable
# on Android (max JDK 17), which is why Android needs its own JNI-based
# package with bundled .so files.
package = "dev.kreuzberg.tslp.android"
# JNI shim depends on serde-derived (de)serialization of DTOs (`ProcessConfig`,
# `ProcessResult`, `Point`, `ByteRange`, ...). The umbrella crate gates those
# derives behind the `serde` feature; enable it here so the scaffold-emitted
# `<crate>-jni/Cargo.toml` lists `features = ["serde"]` on the umbrella dep.
features = ["serde"]

[crates.swift]
module_name = "TreeSitterLanguagePack"
package_name = "TreeSitterLanguagePack"

[crates.zig]
module_name = "tree_sitter_language_pack"
# Curated set mirroring the TSLP_LANGUAGES value used by the
# `[crates.test.zig].before` step. Zig can technically load any grammar via
# the ts_pack_core_ffi runtime auto-download path (same as Go/C#/Java), but
# we restrict the zig e2e suite to the statically-compiled set so it runs
# offline and is not subject to the download-cache race that hits when
# `zig build test` runs eight test binaries in parallel against a shared
# `~/.cache/tree-sitter-language-pack/` directory.
languages = [
  "python",
  "rust",
  "javascript",
  "typescript",
  "go",
  "html",
  "css",
  "json",
  "bash",
  "c",
  "cpp",
  "java",
  "ruby",
  "swift",
  "kotlin",
  "mojo",
  "nim",
  "norg",
]

[crates.output]
python = "crates/ts-pack-core-py/src/"
node = "crates/ts-pack-core-node/src/"
ruby = "packages/ruby/ext/ts_pack_core_rb/src/"
php = "crates/ts-pack-core-php/src/"
ffi = "crates/ts-pack-core-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
csharp = "packages/csharp/"
elixir = "packages/elixir/native/tree_sitter_language_pack_nif/src/"
wasm = "crates/ts-pack-core-wasm/src/"
dart = "packages/dart/lib/src/"
kotlin_android = "packages/kotlin-android/src/main/kotlin/dev/kreuzberg/tslp/android/"
swift = "packages/swift/Sources/TreeSitterLanguagePack/"
zig = "packages/zig/src/"

[crates.include]
types = [
  "ProcessConfig",
  "ProcessResult",
  "FileMetrics",
  "StructureItem",
  "StructureKind",
  "ImportInfo",
  "ExportInfo",
  "ExportKind",
  "CommentInfo",
  "CommentKind",
  "DocstringInfo",
  "DocstringFormat",
  "DocSection",
  "SymbolInfo",
  "SymbolKind",
  "Diagnostic",
  "DiagnosticSeverity",
  "CodeChunk",
  "ChunkContext",
  "Span",
  "PackConfig",
  "Error",
  "LanguageRegistry",
  "DownloadManager",
  "Parser",
  "Tree",
  "Node",
  "TreeCursor",
  "Point",
