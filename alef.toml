]

[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "uv sync --no-install-project --no-install-workspace"
# Apply ALL auto-fixable ruff rules (not just isort) so the alef-generated
# output stays clean under the prek `ruff (legacy alias)` hook, which runs
# `ruff check --fix` (full ruleset). Without this, alef only fixed isort
# and downstream prek runs kept finding rule violations to autofix.
format = "uv run --no-sync ruff check --fix packages/python scripts && uv run --no-sync ruff format packages/python scripts"
check = "uv run --no-sync ruff check packages/python scripts && uv run --no-sync ruff format --check packages/python scripts"

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/ts-pack-core-node"
check = "pnpm dlx oxlint crates/ts-pack-core-node"

[crates.lint.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/ts-pack-core-wasm/pkg"
check = "pnpm dlx oxlint crates/ts-pack-core-wasm/pkg"

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1"
format = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config php-cs-fixer.php src"
check = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config php-cs-fixer.php --dry-run src"

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd packages/ruby && bundle install"
format = "cd packages/ruby && bundle exec rubocop -a ."

[crates.lint.go]
precondition = "command -v golangci-lint >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
format = "cd packages/go && gofmt -w ."
check = "cd packages/go && golangci-lint run ./..."

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
# `mix format` enforces line length (default 98) and idiomatic indentation
# rules that alef's emit-time formatting cannot fully match (e.g. long
# string keyword args get hoisted onto a continuation line). Running it
# during alef's fmt pass keeps generated `.ex` files idempotent under the
# prek `mix-format` hook.
format = "cd packages/elixir && mix format"
check = "cd packages/elixir && mix credo"

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
format = "mvn --batch-mode -f packages/java/pom.xml spotless:apply -q"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[crates.lint.ffi]
precondition = "test -d crates/ts-pack-core-ffi/src && command -v clang-format >/dev/null 2>&1"
format = "find crates/ts-pack-core-ffi/src -name '*.c' -o -name '*.h' | xargs clang-format -i"
check = "find crates/ts-pack-core-ffi/src -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror"

[crates.lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[crates.lint.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
format = "cd packages/kotlin-android && gradle ktlintFormat --no-daemon"
check = "cd packages/kotlin-android && gradle ktlintCheck --no-daemon"

[crates.lint.swift]
precondition = "command -v swift >/dev/null 2>&1"
format = "swift format --in-place --recursive packages/swift/Sources"
check = "swift format lint --recursive packages/swift/Sources"

[crates.lint.zig]
precondition = "command -v zig >/dev/null 2>&1"
format = "cd packages/zig && zig fmt src"
check = "cd packages/zig && zig fmt --check src"

[crates.test.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "maturin develop --manifest-path crates/ts-pack-core-py/Cargo.toml"
e2e = "cd e2e/python && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg uv run --project . --reinstall-package tree-sitter-language-pack pytest tests/ -q"

[crates.test.node]
precondition = "command -v node >/dev/null 2>&1 && command -v pnpm >/dev/null 2>&1 && command -v napi >/dev/null 2>&1"
before = "cd crates/ts-pack-core-node && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg napi build --platform --release"
command = "cd crates/ts-pack-core-node && node -e \"const m = require('./'); console.log('OK:', m.availableLanguages().length)\""
e2e = "cd e2e/node && pnpm install && node ./node_modules/vitest/vitest.mjs run --fileParallelism=false"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
command = "cd packages/go && go test -tags tspack_dev -v ./..."
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.ruby]
before = "cd packages/ruby && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg bundle exec rake compile"
e2e = "cd e2e/ruby && bundle exec rspec spec/"

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release --manifest-path crates/ts-pack-core-php/Cargo.toml"
e2e = "cd e2e/php && php run_tests.php"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,bash,mojo,nim,norg cargo build --release -p ts-pack-core-ffi && mvn package -f packages/java/pom.xml -DskipTests -B -q"
command = "cd packages/java && mvn test"
e2e = "cd e2e/java && mvn test -B"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
command = "cd packages/csharp && dotnet test TreeSitterLanguagePack/TreeSitterLanguagePack.csproj -c Release"
e2e = "DYLD_LIBRARY_PATH=$PWD/target/release:${DYLD_LIBRARY_PATH:-} LD_LIBRARY_PATH=$PWD/target/release:${LD_LIBRARY_PATH:-} dotnet test e2e/csharp/TreeSitterLanguagePack.E2eTests.csproj -c Release"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
e2e = "cd e2e/elixir && TREE_SITTER_LANGUAGE_PACK_BUILD=1 mix test"

[crates.test.wasm]
precondition = "command -v pnpm >/dev/null 2>&1 && command -v wasm-pack >/dev/null 2>&1"
# Mirror the publish-wasm CI environment: curated grammar subset + reduced
# LLVM passes so the wasm32 cross-compile completes in reasonable time.
# Without TSLP_LANGUAGES, all 305 grammars compile statically — abl/parser.c
# alone is 97MB and hangs clang at -O2 for tens of minutes.
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,javascript,typescript,tsx,rust,go,java,c,cpp,csharp,ruby,php,html,css,json,yaml,toml,markdown,bash,sql,lua,scala,kotlin,swift,dockerfile,vue,svelte,elixir,erlang,haskell,zig CARGO_PROFILE_RELEASE_LTO=false CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16 wasm-pack build crates/ts-pack-core-wasm --target nodejs --release --out-dir pkg/nodejs"
e2e = "cd e2e/wasm && pnpm install && pnpm test"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test -- --test-threads=1"

[crates.test.c]
precondition = "command -v make >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release ./run_tests"

[crates.test.kotlin_android]
# Android-only AAR — no JVM JAR to run `gradle test` against. E2E excluded
# because Android tests require an emulator runner (out of scope until a
# kreuzberg-dev/actions/setup-android-emulator action exists).
precondition = "command -v gradle >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release -p ts-pack-core-ffi"

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = [
  "TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release -p tree-sitter-language-pack-swift",
  "bash scripts/setup-swift-bridge.sh",
]
command = "cd packages/swift && swift test"
e2e = "cd packages/swift && swift test"

[crates.test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "{ command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0; } && cd packages/dart && dart pub get && cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml && cd ../../.. && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release -p tree-sitter-language-pack-dart"
command = "cd packages/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"
e2e = "cd e2e/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
command = "cd packages/zig && zig build test -Dffi_path=../../target/release"
e2e = "cd e2e/zig && zig build test -Dffi_path=../../target/release"

[crates.setup.node]
precondition = "command -v pnpm >/dev/null 2>&1"
install = "cd crates/ts-pack-core-node && pnpm install"

[crates.setup.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
install = "cd crates/ts-pack-core-wasm && pnpm install"

[crates.publish]
core_crate = "crates/ts-pack-core"

[crates.publish.languages.ruby]
vendor_mode = "core-only"

[crates.publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

[crates.e2e]
fixtures = "fixtures"
output = "e2e"
fields_array = ["chunks", "imports", "structure"]

# `ProcessResult.metrics` is a nested `FileMetrics` struct. Listing
# `result_fields` enables alef's namespace-aware field navigator so dotted
# paths like `metrics.total_lines` are correctly walked into the nested
# struct accessor rather than collapsed to a non-existent flat accessor on
# `ProcessResult`. The C e2e backend additionally needs `fields_c_types` to
# know:
#   - the intermediate type (`process_result.metrics → FileMetrics`) so it
#     can call `ts_pack_file_metrics_*` accessors, not `ts_pack_metrics_*`
#   - the leaf C type (`file_metrics.<field> → uintptr_t`) so it emits
#     `uintptr_t lines = ...(metrics_handle);` instead of `char* lines = ...`.
result_fields = [
  "language",
  "metrics",
  "structure",
  "imports",
  "exports",
  "comments",
  "docstrings",
  "symbols",
  "diagnostics",
  "chunks",
]

[crates.e2e.fields_c_types]
"process_result.metrics" = "FileMetrics"
"file_metrics.total_lines" = "uintptr_t"
"file_metrics.code_lines" = "uintptr_t"
"file_metrics.comment_lines" = "uintptr_t"
"file_metrics.blank_lines" = "uintptr_t"
