[workspace]
alef_version = "0.16.18"
languages = [
    "python",
    "node",
    "ruby",
    "php",
    "ffi",
    "go",
    "java",
    "csharp",
    "elixir",
    "wasm",
    "dart",
    "kotlin_android",
    "swift",
    "zig",
    "jni",
]

[workspace.opaque_types]
Language = "tree_sitter_language_pack::Language"

[workspace.dto]
# Languages without an entry below use alef's `DtoConfig` schema default.
# alef's `DtoConfig` (alef-core/src/config/dto.rs) covers python/node/ruby/php/elixir/go/java/csharp/r.
# wasm, dart, swift, zig, kotlin_android, ffi have no DTO config concept — they
# emit native types via their backend (TS interface, frb class, swift struct,
# zig comptime struct, kotlin data class, C struct).
python = "dataclass"
python_output = "typed-dict"
node = "interface"
ruby = "struct"
php = "readonly-class"
elixir = "struct"
go = "struct"
java = "record"
csharp = "record"

[workspace.sync]
extra_paths = [
    "crates/ts-pack-core-node/package.json",
    "crates/ts-pack-core-node/npm/*/package.json",
    "packages/ruby/ext/ts_pack_core_rb/native/Cargo.toml",
    "pyproject.toml",
]

[[workspace.sync.text_replacements]]
path = "test_apps/node/package.json"
search = '"@kreuzberg/tree-sitter-language-pack": "[^"]*"'
replace = '"@kreuzberg/tree-sitter-language-pack": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/wasm/package.json"
search = '"@kreuzberg/tree-sitter-language-pack-wasm": "[^"]*"'
replace = '"@kreuzberg/tree-sitter-language-pack-wasm": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/java/pom.xml"
search = '(<artifactId>tree-sitter-language-pack</artifactId>\s+<version>)[^<]+'
replace = '${1}{version}'

[[workspace.sync.text_replacements]]
path = "test_apps/csharp/TreeSitterLanguagePack.E2eTests.csproj"
search = 'Include="TreeSitterLanguagePack" Version="[^"]*"'
replace = 'Include="TreeSitterLanguagePack" Version="{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/php/composer.json"
search = '"kreuzberg-dev/tree-sitter-language-pack": "[^"]*"'
replace = '"kreuzberg-dev/tree-sitter-language-pack": "{version}"'

[[workspace.sync.text_replacements]]
path = "test_apps/go/go.mod"
search = 'kreuzberg-dev/tree-sitter-language-pack/packages/go v[^\s]*'
replace = 'kreuzberg-dev/tree-sitter-language-pack/packages/go v{version}'

[[workspace.sync.text_replacements]]
path = "test_apps/rust/Cargo.toml"
search = '(package = "tree-sitter-language-pack", version = ")[^"]*'
replace = '${1}{version}'

[[workspace.sync.text_replacements]]
path = "test_apps/ruby/Gemfile"
search = "gem 'tree_sitter_language_pack', '[^']*'"
replace = "gem 'tree_sitter_language_pack', '{version}'"

[[workspace.sync.text_replacements]]
path = "packages/elixir/native/tree_sitter_language_pack_nif/Cargo.toml"
search = '^version = "[^"]*"'
replace = 'version = "{version}"'

[[crates]]
name = "tree-sitter-language-pack"
core_import = "tree_sitter_language_pack"
sources = ["crates/ts-pack-core/src/lib.rs"]
version_from = "Cargo.toml"
features = ["serde", "config", "download"]

[[crates.source_crates]]
name = "tree-sitter-language-pack"
sources = ["crates/ts-pack-core/src/lib.rs"]
workspace_root = "."
features = ["serde", "config", "download"]

[crates.python]
module_name = "_native"
pip_name = "tree-sitter-language-pack"
release_gil = true

[crates.python.stubs]
output = "packages/python/tree_sitter_language_pack/"

[crates.python.capsule_types]
Language = "tree_sitter.Language"

[crates.python.extra_init_imports]
"._supported_languages" = ["SupportedLanguage"]

[crates.node]
package_name = "@kreuzberg/tree-sitter-language-pack"

[crates.node.capsule_types.Language]
type = "Language"
from_module = "tree-sitter"
property_name = "language"
type_tag = { lower = "0x8AF2E5212AD58ABF", upper = "0xD5006CAD83ABBA16" }

[crates.ruby]
gem_name = "tree_sitter_language_pack"

[crates.ruby.stubs]
output = "packages/ruby/sig"

[crates.php]
extension_name = "tree_sitter_language_pack"
cargo_crate_name = "ts-pack-core-php"

[crates.elixir]
app_name = "tree_sitter_language_pack"

[crates.wasm]
env_shims = ["iswspace", "iswalnum", "towupper", "iswalpha"]
features = ["serde", "config", "dynamic-loading"]

[crates.ffi]
prefix = "ts_pack"
header_name = "ts_pack.h"
lib_name = "ts_pack_core_ffi"

[crates.go]
module = "github.com/kreuzberg-dev/tree-sitter-language-pack/packages/go"
package_name = "tspack"

[crates.java]
package = "dev.kreuzberg.treesitterlanguagepack"

[crates.csharp]
namespace = "TreeSitterLanguagePack"
project_file = "packages/csharp/TreeSitterLanguagePack/TreeSitterLanguagePack.csproj"

[crates.dart]
pubspec_name = "tree_sitter_language_pack"
lib_name = "tree_sitter_language_pack"
style = "frb"

[crates.kotlin_android]
# Android-only AAR. JVM Kotlin users consume the canonical Java/Panama-FFM
# package directly (Kotlin/Java interop is total). Panama FFM is unavailable
# on Android (max JDK 17), which is why Android needs its own JNI-based
# package with bundled .so files.
package = "dev.kreuzberg.tslp.android"

[crates.swift]
module_name = "TreeSitterLanguagePack"
package_name = "TreeSitterLanguagePack"

[crates.zig]
module_name = "tree_sitter_language_pack"

[crates.output]
python = "crates/ts-pack-core-py/src/"
node = "crates/ts-pack-core-node/src/"
ruby = "packages/ruby/ext/ts_pack_core_rb/src/"
php = "crates/ts-pack-core-php/src/"
ffi = "crates/ts-pack-core-ffi/src/"
go = "packages/go/"
java = "packages/java/src/main/java/"
csharp = "packages/csharp/"
elixir = "packages/elixir/native/tree_sitter_language_pack_nif/src/"
wasm = "crates/ts-pack-core-wasm/src/"
dart = "packages/dart/lib/src/"
kotlin_android = "packages/kotlin-android/src/main/kotlin/dev/kreuzberg/tslp/android/"
swift = "packages/swift/Sources/TreeSitterLanguagePack/"
zig = "packages/zig/src/"

[crates.include]
types = [
    "ProcessConfig",
    "ProcessResult",
    "FileMetrics",
    "StructureItem",
    "StructureKind",
    "ImportInfo",
    "ExportInfo",
    "ExportKind",
    "CommentInfo",
    "CommentKind",
    "DocstringInfo",
    "DocstringFormat",
    "DocSection",
    "SymbolInfo",
    "SymbolKind",
    "Diagnostic",
    "DiagnosticSeverity",
    "CodeChunk",
    "ChunkContext",
    "Span",
    "PackConfig",
    "Error",
    "LanguageRegistry",
    "DownloadManager",
    "Parser",
    "Tree",
    "Node",
    "TreeCursor",
    "Point",
    "ByteRange",
]
functions = [
    "available_languages",
    "has_language",
    "language_count",
    "get_language",
    "get_parser",
    "detect_language",
    "detect_language_from_path",
    "detect_language_from_extension",
    "detect_language_from_content",
    "get_highlights_query",
    "get_injections_query",
    "get_locals_query",
    "process",
    "init",
    "configure",
    "download",
    "download_all",
    "manifest_languages",
    "downloaded_languages",
    "clean_cache",
    "cache_dir",
]

[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "uv sync --no-install-project"
format = "uv run --no-sync ruff check --fix --select I packages/python scripts && uv run --no-sync ruff format packages/python scripts"
check = "uv run --no-sync ruff check packages/python scripts && uv run --no-sync ruff format --check packages/python scripts"

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt packages/typescript"
check = "pnpm dlx oxlint packages/typescript"

[crates.lint.wasm]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt packages/wasm"
check = "pnpm dlx oxlint packages/wasm"

[crates.lint.php]
precondition = "command -v php >/dev/null 2>&1"
format = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config php-cs-fixer.php src"
check = "cd packages/php && PHP_CS_FIXER_IGNORE_ENV=1 php vendor/bin/php-cs-fixer fix --config php-cs-fixer.php --dry-run src"

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "cd packages/ruby && bundle install"
format = "cd packages/ruby && bundle exec rubocop -a ."

[crates.lint.go]
precondition = "command -v golangci-lint >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
format = "cd packages/go && gofmt -w ./..."
check = "cd packages/go && golangci-lint run ./..."

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
check = "cd packages/elixir && mix credo"

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
format = "mvn --batch-mode -f packages/java/pom.xml spotless:apply -q"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[crates.lint.ffi]
precondition = "test -d crates/ts-pack-core-ffi/src && command -v clang-format >/dev/null 2>&1"
format = "find crates/ts-pack-core-ffi/src -name '*.c' -o -name '*.h' | xargs clang-format -i"
check = "find crates/ts-pack-core-ffi/src -name '*.c' -o -name '*.h' | xargs clang-format --dry-run --Werror"

[crates.lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[crates.lint.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
format = "cd packages/kotlin-android && gradle ktlintFormat --no-daemon"
check = "cd packages/kotlin-android && gradle ktlintCheck --no-daemon"

[crates.lint.swift]
precondition = "command -v swift >/dev/null 2>&1"
format = "swift format --in-place --recursive packages/swift/Sources"
check = "swift format lint --recursive packages/swift/Sources"

[crates.lint.zig]
precondition = "command -v zig >/dev/null 2>&1"
format = "cd packages/zig && zig fmt src"
check = "cd packages/zig && zig fmt --check src"

[crates.test.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "maturin develop --manifest-path crates/ts-pack-core-py/Cargo.toml"
e2e = "cd e2e/python && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg uv run --project . --reinstall-package tree-sitter-language-pack pytest tests/ -q"

[crates.test.node]
precondition = "command -v node >/dev/null 2>&1 && command -v pnpm >/dev/null 2>&1 && command -v napi >/dev/null 2>&1"
before = "cd crates/ts-pack-core-node && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg napi build --release"
command = "cd crates/ts-pack-core-node && node -e \"const m = require('./'); console.log('OK:', m.availableLanguages().length)\""
e2e = "cd e2e/node && pnpm install && node ./node_modules/vitest/vitest.mjs run --fileParallelism=false"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
command = "cd packages/go && go test -tags tspack_dev -v ./..."
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.ruby]
before = "cd packages/ruby && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg bundle exec rake compile"
e2e = "cd e2e/ruby && bundle exec rspec spec/"

[crates.test.php]
precondition = "command -v php >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release --manifest-path crates/ts-pack-core-php/Cargo.toml"
e2e = "cd e2e/php && php run_tests.php"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi && mvn package -f packages/java/pom.xml -DskipTests -B -q"
command = "cd packages/java && mvn test"
e2e = "cd e2e/java && mvn test -B"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
command = "cd packages/csharp && dotnet test TreeSitterLanguagePack/TreeSitterLanguagePack.csproj -c Release"
e2e = "DYLD_LIBRARY_PATH=$PWD/target/release:${DYLD_LIBRARY_PATH:-} LD_LIBRARY_PATH=$PWD/target/release:${LD_LIBRARY_PATH:-} dotnet test e2e/csharp/TreeSitterLanguagePack.E2eTests.csproj -c Release"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
e2e = "cd e2e/elixir && TREE_SITTER_LANGUAGE_PACK_BUILD=1 mix test"

[crates.test.wasm]
precondition = "command -v pnpm >/dev/null 2>&1 && command -v wasm-pack >/dev/null 2>&1"
before = "wasm-pack build crates/ts-pack-core-wasm --target nodejs --release --out-dir pkg/nodejs"
e2e = "cd e2e/wasm && pnpm install && pnpm test"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test -- --test-threads=1"

[crates.test.c]
precondition = "command -v make >/dev/null 2>&1"
e2e = "cd e2e/c && make clean && make && DYLD_LIBRARY_PATH=../../target/release ./test_runner"

[crates.test.kotlin_android]
# Android-only AAR — no JVM JAR to run `gradle test` against. E2E excluded
# because Android tests require an emulator runner (out of scope until a
# kreuzberg-dev/actions/setup-android-emulator action exists).
precondition = "command -v gradle >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release -p ts-pack-core-ffi"

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = [
    "TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release -p ts-pack-core-swift",
    "bash scripts/setup-swift-bridge.sh",
]
command = "cd packages/swift && swift test"
e2e = "cd packages/swift && swift test"

[crates.test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = "{ command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0; } && cd packages/dart && dart pub get && cd rust && flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml && cd ../../.. && TSLP_LINK_MODE=static TSLP_LANGUAGES=mojo,nim,norg cargo build --release -p ts-pack-core-dart"
command = "cd packages/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"
e2e = "cd e2e/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "TSLP_LINK_MODE=static TSLP_LANGUAGES=python,rust,javascript,typescript,go,html,css,json,mojo,nim,norg cargo build --release -p ts-pack-core-ffi"
command = "cd packages/zig && zig build test"
e2e = "cd e2e/zig && zig build test"

[crates.setup.node]
precondition = "command -v pnpm >/dev/null 2>&1"
install = "cd packages/typescript && pnpm install"

[crates.publish]
core_crate = "crates/ts-pack-core"

[crates.publish.languages.ruby]
vendor_mode = "core-only"

[crates.publish.languages.elixir]
vendor_mode = "core-only"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

