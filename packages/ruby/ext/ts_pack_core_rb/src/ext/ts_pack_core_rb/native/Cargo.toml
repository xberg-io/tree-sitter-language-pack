[package]
name = "ts-pack-core-rb"
version = "1.9.0-rc.4"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
readme = false
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
categories = ["text-processing"]

[package.metadata.cargo-machete]
ignored = ["magnus", "serde", "serde_json", "tree-sitter-language-pack"]

[lib]
name = "ts_pack_core_rb"
path = "../src/lib.rs"
crate-type = ["cdylib"]

[dependencies]
magnus = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tree-sitter-language-pack = { path = "../../../../../crates/ts-pack-core", features = [
    "serde",
    "config",
    "download",
] }
