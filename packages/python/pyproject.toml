[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "tree-sitter-language-pack"
version = "1.8.1"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
license = "MIT"
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]
authors = [{ name = "Kreuzberg Team" }]
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
dependencies = ["tree-sitter>=0.23"]
[project.urls]
repository = "https://github.com/kreuzberg-dev/tree-sitter-language-pack"

[tool.maturin]
module-name = "tree_sitter_language_pack._native"
manifest-path = "../../crates/ts-pack-core-py/Cargo.toml"
# abi3-py310 produces a single wheel per platform that loads on Python 3.10+,
# avoiding a per-Python-version build matrix.
features = ["pyo3/extension-module", "pyo3/abi3-py310"]
python-packages = ["tree_sitter_language_pack"]

[dependency-groups]
dev = ["ruff>=0.14.8", "mypy>=1.19.0"]

[tool.ruff]
target-version = "py310"
line-length = 120

[tool.ruff.lint]
select = ["ALL"]
ignore = [
  "ANN401",
  "ASYNC109",
  "ASYNC110",
  "BLE001",
  "COM812",
  "D100",
  "D104",
  "D107",
  "D205",
  "E501",
  "EM",
  "FBT",
  "FIX",
  "ISC001",
  "PD011",
  "PGH003",
  "PLR2004",
  "PLW0603",
  "S104",
  "S110",
  "S603",
  "TD",
  "TRY",
]

[tool.ruff.lint.mccabe]
max-complexity = 15

[tool.ruff.lint.pylint]
max-args = 10
max-branches = 15
max-returns = 10

[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "D103", "ANN", "PLR2004"]

[tool.ruff.format]
docstring-code-line-length = 120
docstring-code-format = true

[tool.mypy]
python_version = "3.10"
strict = true
show_error_codes = true
implicit_reexport = false
namespace_packages = true
