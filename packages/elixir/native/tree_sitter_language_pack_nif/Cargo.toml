[package]
name = "tree_sitter_language_pack_nif"
version = "1.8.0-rc.25"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 305 programming languages"
readme = false
keywords = ["tree-sitter", "parser", "syntax", "language-pack"]
categories = ["text-processing"]

[lib]
crate-type = ["cdylib"]

[dependencies]
tree-sitter-language-pack = { path = "../../../../crates/ts-pack-core", features = ["serde", "config"] }
rustler = "0.37"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[package.metadata.cargo-machete]
ignored = ["rustler", "serde", "serde_json", "tokio", "tree-sitter-language-pack"]
