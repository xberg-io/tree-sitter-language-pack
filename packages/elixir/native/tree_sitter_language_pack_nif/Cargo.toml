[package]
name = "tree_sitter_language_pack_nif"
version = "1.11.0"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 306 programming languages"
readme = false
keywords = ["language-pack", "parser", "syntax", "tree-sitter"]
categories = []

[package.metadata.cargo-machete]
ignored = ["alloc-no-stdlib", "alloc-stdlib", "brotli-decompressor"]

[workspace]

[lib]
name = "tree_sitter_language_pack_nif"

crate-type = ["cdylib"]

[features]
default = ["download"]
download = ["tree-sitter-language-pack/download"]

[dependencies]
alloc-no-stdlib = "=2.0.4"
alloc-stdlib = "=0.2.2"
brotli-decompressor = "=5.0.1"
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tree-sitter-language-pack = { version = "1.11.0", path = "../../../../crates/ts-pack-core", features = ["serde", "config", "download"] }
[lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(feature, values("download"))'] }
