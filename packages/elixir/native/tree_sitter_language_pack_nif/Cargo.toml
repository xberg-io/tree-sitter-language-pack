[package]
name = "tree_sitter_language_pack_nif"
version = "1.9.0-rc.47"
edition = "2024"
license = "MIT"
description = "Pre-compiled tree-sitter grammars for 306 programming languages"
readme = false
keywords = ["language-pack", "parser", "syntax", "tree-sitter"]
categories = []

[workspace]

[lib]
name = "tree_sitter_language_pack_nif"

crate-type = ["cdylib"]

[dependencies]
rustler = "0.38"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tree-sitter-language-pack = { version = "1.9.0-rc.47", path = "../../../../crates/ts-pack-core", features = ["serde", "config", "download"] }

[patch.crates-io]
alloc-no-stdlib = { version = "=2.0.4" }
alloc-stdlib = { version = "=0.2.2" }
brotli-decompressor = { version = "=5.0.1" }
