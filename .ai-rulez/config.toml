# AI-Rulez Configuration (migrated to V4 TOML format)
# Documentation: https://github.com/Goldziher/ai-rulez

version = '4.0'
name = 'tree-sitter-language-pack'
description = 'Comprehensive tree-sitter grammar compilation and polyglot parser bindings (Python, TypeScript, Ruby, Go, Java, C#, Elixir, PHP, WASM)'
gitignore = true
default = 'full'
presets = ['claude', 'copilot', 'cursor', 'antigravity', 'codex']
builtins = ['rust', 'python', 'typescript', 'go', 'php', 'csharp', 'default-commands']

[header]
style = 'minimal'

[profiles]
full = ['parser-compilation', 'language-management']

[[includes]]
name = 'kreuzberg-core'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/core'
merge_strategy = 'local-override'

[[includes]]
name = 'kreuzberg-languages'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/languages'
merge_strategy = 'local-override'

[[includes]]
name = 'kreuzberg-cicd'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/cicd'
merge_strategy = 'local-override'

[[includes]]
name = 'kreuzberg-e2e-generator'
source = 'https://github.com/kreuzberg-dev/ai-rulez.git'
path = 'modules/e2e-generator'
merge_strategy = 'local-override'

[[installed_skills]]
name = 'alef'
source = 'https://github.com/kreuzberg-dev/alef.git'

[[mcp_servers]]
name = 'playwright'
description = 'Playwright browser automation for E2E testing and docs verification'
command = 'npx'
args = ['-y', '@playwright/mcp@latest']

[defaults]
effort = 'medium'
